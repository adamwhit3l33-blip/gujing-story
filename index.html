<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>诡镜 Debug</title>
<style>
:root{--bg:#1a1a1e;--card:#2a2a2e;--fg:#e8e8e8;--fg2:#999;--fg3:#666;--ac:#3b82f6;--bd:#333}
[data-theme=light]{--bg:#f5f5f0;--card:#eeecec;--fg:#2c2c2c;--fg2:#666;--fg3:#999;--bd:#e0e0d8;--ac:#2563eb}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Noto Sans SC",sans-serif;color:var(--fg);background:var(--bg);line-height:1.6;font-size:15px;min-height:100vh}
.app{max-width:700px;margin:0 auto;min-height:100vh}
.hdr{display:flex;align-items:center;padding:16px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--bg);z-index:10}
.hdr h1{flex:1;font-size:18px;font-weight:600;text-align:center}
.cli{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--bd);cursor:pointer;font-size:15px}
.cli:hover{background:var(--card)}
.cli .n{color:var(--fg3);min-width:28px}
.cli .t{font-size:14px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
var chapters=[{"title":"\u7b2c\u4e00\u7ae0","content":"# \u8be1\u955c \u00b7 \u7b2c\u4e00\u7ae0\u2026"}];
var view='novel';
var curCh=parseInt(localStorage.getItem('gcc')||'0');
var app=document.getElementById('app');
app.innerHTML='<div class="hdr"><h1>\u8be1\u955c\u7cfb\u5217</h1></div>';
var cl='';
for(var i=0;i<chapters.length;i++){
  var ch=chapters[i];
  cl+='<div class="cli"><span class="n">'+(i+1)+'.</span><span class="t">'+ch.title+'</span></div>';
}
app.innerHTML+='<div class="cl-hdr"><h3>\u76ee\u5f55</h3></div>'+cl;
console.log('Rendered',chapters.length,'chapters');
</script>
</body>
</html>
