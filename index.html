<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>诡镜系列</title>
<style>
:root{--bg:#1a1a1e;--card:#2a2a2e;--fg:#e8e8e8;--fg2:#999;--fg3:#666;--ac:#3b82f6;--bd:#333}
[data-theme=light]{--bg:#fef3e2;--card:#f5e6d0;--fg:#3a3226;--fg2:#6b6050;--fg3:#9b8070;--bd:#e0d5c0;--ac:#2563eb}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Noto Sans SC",sans-serif;color:var(--fg);background:var(--bg);line-height:1.6;font-size:15px;min-height:100vh}
.app{max-width:960px;margin:0 auto;min-height:100vh}
.hdr{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--bg);z-index:10}
.hdr .bk{background:none;border:none;color:var(--fg2);font-size:24px;cursor:pointer;padding:4px 8px 4px 0}
.hdr h1{flex:1;font-size:16px;font-weight:600;text-align:center}
.hdr .act{background:none;border:none;color:var(--fg2);font-size:18px;cursor:pointer;padding:4px 8px}
.cover{padding:24px 16px 0;display:flex;gap:14px}
.cbox{width:100px;height:133px;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.4);position:relative}
.cbox::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 30% 30%,rgba(233,69,96,.2),transparent 60%)}
.ctxt{font-size:28px;font-weight:900;color:#e94560;text-shadow:0 0 20px rgba(233,69,96,.6);letter-spacing:4px}
.cbdg{position:absolute;top:6px;right:6px;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700}
.ninfo{flex:1;display:flex;flex-direction:column;justify-content:center}
.ninfo h1{font-size:22px;font-weight:800;margin-bottom:6px}
.ninfo .auth{font-size:13px;color:var(--ac);margin-bottom:8px}
.tags{display:flex;gap:4px;flex-wrap:wrap}
.tags span{font-size:10px;color:var(--fg3);background:var(--card);padding:2px 8px;border-radius:10px}
.stats{display:flex;justify-content:space-around;padding:16px;border-bottom:1px solid var(--bd)}
.stat{text-align:center;flex:1}
.stat .sv{font-size:17px;font-weight:700}
.stat .sl{font-size:11px;color:var(--fg3);margin-top:2px}
.intro{padding:14px 16px;border-bottom:1px solid var(--bd)}
.intro h3{font-size:13px;color:var(--fg2);margin-bottom:4px;font-weight:600;letter-spacing:1px}
.intro p{font-size:14px;color:var(--fg2);line-height:1.7}
.cl-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--bd)}
.cl-hdr h3{font-size:14px;font-weight:600}
.cli{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--bd);cursor:pointer}
.cli:hover{background:var(--card)}
.cli .n{color:var(--fg3);font-size:13px;min-width:24px}
.cli .t{font-size:14px}
.rpage{padding:24px;font-size:17px;line-height:2;max-width:680px;margin:0 auto}
.rpage h1{font-size:22px;font-weight:700;text-align:center;margin:28px 0 20px;padding-bottom:12px;border-bottom:1px solid var(--bd)}
.rpage h2{font-size:19px;margin:28px 0 12px}
.rpage h3{font-size:16px;margin:20px 0 8px}
.rpage p{margin:10px 0;text-indent:2em;text-align:justify}
.rpage blockquote{border-left:3px solid var(--ac);padding:6px 12px;color:var(--fg2);font-style:italic}
.rpage hr{border:none;border-top:1px solid var(--bd);margin:20px 0}
.rpage table{border-collapse:collapse;width:100%;margin:16px 0}
.rpage th,.rpage td{border:1px solid var(--bd);padding:6px 8px;text-align:left}
.rpage th{background:var(--card)}
.rnav{display:flex;gap:8px;padding:16px;max-width:680px;margin:0 auto}
.rnav button{flex:1;background:var(--ac);color:#fff;border:none;padding:12px;border-radius:24px;font-size:14px;font-weight:600;cursor:pointer}
.rnav button:disabled{background:var(--card);color:var(--fg3);cursor:default}
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--bd);flex-wrap:wrap}
.tb-btn{background:var(--card);border:1px solid var(--bd);color:var(--fg);padding:4px 10px;border-radius:6px;font-size:13px;cursor:pointer;white-space:nowrap}
.tb-btn:hover{background:var(--ac)}
.tb-label{font-size:12px;color:var(--fg2)}
.tts-bar{display:none;padding:8px 16px;border-bottom:1px solid var(--bd);gap:8px;align-items:center;flex-wrap:wrap}
.tts-bar.show{display:flex}
.tts-btn{background:var(--ac);color:#fff;border:none;padding:6px 14px;border-radius:16px;font-size:13px;cursor:pointer}
.tts-btn:disabled{opacity:.5;cursor:default}
.rate-ctrl{display:flex;align-items:center;gap:4px}
.audio-sec{padding:8px 16px;border-bottom:1px solid var(--bd)}
.audio-sec audio{width:100%}
.audio-label{font-size:12px;color:var(--fg2)}
.comments-sec{max-width:680px;margin:0 auto;padding:0 16px 24px}
.comments-sec h3{font-size:14px;margin:12px 0 8px;color:var(--fg2)}
.cmt-input{display:flex;gap:8px;margin-bottom:12px}
.cmt-input input{flex:1;padding:8px 12px;border:1px solid var(--bd);border-radius:8px;background:var(--card);color:var(--fg);font-size:14px}
.cmt-input button{padding:8px 16px;background:var(--ac);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer}
.cmt-list{list-style:none}
.cmt-item{padding:8px 0;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:flex-start}
.cmt-meta{font-size:11px;color:var(--fg3);margin-bottom:2px}
.cmt-text{font-size:14px;line-height:1.5}
.cmt-del{background:none;border:none;color:var(--fg3);font-size:16px;cursor:pointer}
.cmt-del:hover{color:#ef4444}
.tbtn{position:fixed;bottom:24px;right:24px;width:44px;height:44px;background:var(--ac);color:#fff;border-radius:50%;border:none;font-size:20px;cursor:pointer;z-index:50}
@media(min-width:768px){
  body{font-size:17px}
  .rpage{max-width:900px;padding:32px 40px}
  .rnav{max-width:900px;padding:20px 40px}
  .comments-sec{max-width:900px;padding:0 40px 32px}
}
@media(min-width:1200px){
  .app{max-width:1280px}
  .rpage{max-width:1050px;font-size:21px}
  .rnav{max-width:1050px}
  .comments-sec{max-width:1050px}
}
</style>
</head>
<body>
<div class="app" id="app"></div>
<button class="tbtn" id="thmBtn" onclick="toggleTheme()">🌙</button>
<script>
var SYNOPSIS="木子韦在鬼市花八十块买了一面缠枝莲纹的古老铜镜。第二天开始耳鸣，医生说没问题。第三天镜子里的倒影慢了半拍。第五天，右耳彻底聋了。第七天，一个黑色影子从镜子里渗出来，钻进了他的胸口——从此他有了两个心跳。同一时间，市局档案管理处特殊科（内部称第九收容站）的老狼在调查一系列与铜镜有关的失踪和死亡案件。租客陈明在密闭的出租屋里三秒内凭空蒸发，只留下一本日记和一段十七秒的视频——视频里，一只黑色的手从镜子里伸出来，在空中画了一组同心圆，圆心点了一只眼睛。陈明的日记最后一页，笔迹忽然变得工整得像印刷体：他。已经不在了。现在是。我。老狼自己也开始被标记——左手小臂上出现了一道铜绿色的纹路。";
var chapters = [{"title": "第一章", "content": "# 诡镜 · 第一章：无声之人\n\n## 序\n\n这个世界上有些东西，不应该存在——但它们一直在。\n\n从什么时候开始的，没有人知道。最早的记录刻在商代的甲骨上，五个字：\"有物非人所造，能化人。\"\n\n之后是西周，太卜官设了一个暗档，专门收录民间上报的异闻器物。汉代改叫\"秘阁\"，设在未央宫地下。唐代归入太史局，另立\"异闻司\"。宋代转到钦天监底下，叫\"别录司\"。明代是锦衣卫的内部编制——\"异案房\"。\n\n每一个朝代的名字都不同。做的事情是同一件。\n\n收。容。那。些。不。应。该。存。在。的。东。西。\n\n这个组织从来不属于任何朝代的正式编制。它更像一条地下流动的暗线，依附于权力体系但又游离于体系之外，每隔几十年换一副皮囊、换一个名字，但内部的传承从未中断过。\n\n创办原因只有一个：有些东西普通人应付不了。\n\n不是比喻。是字面意义上的应付不了——你看到它，它就开始影响你。你想得越明白，陷得越深。历史上无数次发生过一件事：一个正常的人发现了一件不正常的东西，然后试图用理性去理解它。理解的过程就是被同化的过程。三个月后那个人变了。一年后消失了。或者更惨——还在那里，但里面已经不是原来那个人了。\n\n所以这个组织的核心准则只有三条：\n\n第一，不要问自己看到的是什么。\n第二，不要试图解释它。\n第三，如果解释了，别让任何人听见。\n\n现代，它挂在一个不起眼的名字下面：档案管理处特殊科。内部自称第九收容站。位于某市局大楼地下三层，表面是一片废弃办公区，实际是四十七个钢筋混凝土隔间，内壁贴铅板，门是气密门，玻璃是三层夹胶防弹玻璃中间灌了水银。\n\n四十七个隔间里住了四十六个\"东西\"。每一个都是从现场回收的异常物件。民间叫法五花八门——邪器、妖物、鬼器。组织内部有统一称呼：异化物。\n\n异化物按危险程度分为八个等级，叫\"威标\"：\n\n| 等级 | 定义 | 处置方式 |\n|------|------|----------|\n| E级 | 无害。有超常属性但不产生现实影响。 | 档案室存放 |\n| D级 | 低危。特定条件下触发，效果可预测。 | 专用存放柜 |\n| C级 | 中危。不可控影响，传播范围有限。 | 收容隔间 |\n| B级 | 高危。具有传播性，可影响多人。 | 隔间+外围监控 |\n| A级 | 严重。可致死或不可逆异化。 | 隔间+24h值守 |\n| S级 | 极端。大范围传播风险。常规收容不可靠。 | 独立封闭空间 |\n| SS级 | 灾难。失控影响整座城市。 | 不可收容 |\n| SSS级 | 灭世级。理论存在，从未观测到。 | 不可收容 |\n\n目前收容的最高级别是B+——一面宋代铜镜，来自农村集体癔症案。编号C-0317。\n\n但站内有一份从未录入电子系统的牛皮纸档案，红色字体标注四个字：不可收容。里面记载的是一面镜子。缠枝莲纹边框。名字来自明朝万历年间张岱的笔记：\n\n> \"秦始皇有照骨镜，能照人脏腑。后世有匠仿之，以玄铜铸镜，名曰**夺舍玄鉴**。此镜不照骨，照影。镜中之影非人之投射，乃异界之物。人照之久，影渐离体，魔渐入舍。待异化功成，生人化影，归于镜内虚无，从此世间再无此人。\"\n\n**夺舍**——镜中之影进入人体，逐步取代宿主。**玄鉴**——古代对神异镜子的雅称。\n\n站内那面宋代铜镜只是夺舍玄鉴的仿品之一，B+。真正的夺舍玄鉴没有人见过实体，但仿品散落在民间，数量不详。缠枝莲纹是标志性纹样。那批匠人在历史上没有留下任何记录，但他们的作品每一面都出过事。\n\nSS级。跟秦王的照骨镜同一个级别。\n\n从来没有被收容成功过。\n\n而故事开始的时候，其中一面正挂在一个人的客厅墙上。\n\n---\n\n## 一\n\n木子韦买下那面铜镜是在一个周六的下午。\n\n鬼市藏在城西一条废弃的铁路桥底下。摊主是个六十多岁的老头，脸上皱纹深得像刀刻出来的。铜镜摆在摊子最角落，镜面蒙着一层灰，边框上的缠枝纹已经磨得发亮。\n\n\"民国的东西。\"老头说，\"从一个大户人家收来的。镜子这东西，照久了会沾上主人的气。\"\n\n木子韦没在意。八十块钱，掏了现金。铜镜很沉，他抱在怀里走了一公里才打到车。回到家挂在客厅墙上，正对着沙发。\n\n那天晚上他睡得很沉。\n\n第二天早上醒来，右耳开始耳鸣。\n\n不是那种偶尔的嗡嗡声。是持续不断的、高频率的尖啸，像一根细针从耳道深处一直扎进脑子。他以为是没睡好，洗了把脸，耳鸣还在。\n\n下午去了医院。耳鼻喉科医生用仪器检查了一遍，又让他做了听力测试。\n\n\"听力正常。\"医生看着报告单，\"耳道、鼓膜、耳蜗都没问题。可能是压力大，神经性耳鸣。回去休息几天，别熬夜。\"\n\n木子韦拿着报告单回家。耳鸣还在，但好像没那么尖锐了。变成了一种背景音，像老式电视没信号时的雪花声。\n\n他站在客厅里，看着墙上那面铜镜。镜子里映出他的脸。脸色有点苍白，眼圈发黑。他抬起左手，想揉揉太阳穴。\n\n镜子里的人也抬起了左手。\n\n但慢了半拍。\n\n木子韦的手已经抬到额头的位置，镜中人的手才刚离开身侧。那个延迟很短，大概零点几秒。短到他以为是自己的错觉。\n\n他放下手。镜子里的人也放下手。这次同步了。\n\n盯着镜子看了半分钟。一切正常。耳鸣还在。\n\n第三天，耳鸣变成了间歇性的。响一阵，停一阵。停的时候世界特别安静，安静得让他有点不安。\n\n第四天早上，他接电话时发现右耳听不清了。不是完全听不见，是声音变得模糊，像隔着一层水。他把手机换到左耳，声音清晰了。换了座机试，一样。\n\n第五天，右耳彻底听不见了。\n\n不是慢慢变弱，是突然之间，像有人按下了静音键。前一秒还能听到窗外汽车的喇叭声，后一秒就只剩下左耳里的世界。\n\n他又去了医院。同样的检查，同样的结果。\n\n\"突发性耳聋。\"医生说，\"原因不明。可能是病毒感染，也可能是血管问题。先住院观察吧。\"\n\n木子韦没住院。他办了离职，拿了补偿金，回家。失业救济金每个月打到卡上，不多，但够活。日子被拉成一条很细的线。\n\n他开始长时间待在家里。无声的生活有一种奇怪的重力，把所有东西都往底下拽。\n\n他以为自己已经习惯了。\n\n## 二\n\n起初只是极细微的错位。\n\n他站在镜子前——镜子里的人也站在那里，但姿态总觉得不太对。不是\"不像\"，而是像，但慢了半拍。就像信号不好的视频通话，画面和嘴型差那么零点几秒。\n\n他以为是错觉。医生说过，听力丧失之后大脑会自己填补一些东西。\n\n有一天，他站在镜子前看自己。衣领很平，不需要整理。他只是站着，看着镜子里的自己。镜中人的手慢慢抬了起来——动作迟疑，像水下的人伸出手臂——然后轻轻抚过自己的脖颈。\n\n木子韦没有动。他的手垂在身侧，指尖冰凉。\n\n镜子里的手还在动。从脖颈滑到下巴，停住。\n\n然后嘴角微微向上翘了一点。不是他的表情。\n\n他后退了一步。镜子里的人也跟着后退——这次倒是同步的。\n\n他站了很久。无声的房间里只有呼吸时胸腔的震动感。他听不见，但能感觉到。\n\n那天之后他开始刻意回避那面镜子。路过客厅时眼睛盯着地板，余光里铜镜像一只睁着的眼睛。\n\n\n\n深夜凌晨一点半，他翻了个身，面朝墙壁。\n\n背后传来一丝震动。\n\n他听不见。不是耳朵接收到了什么——而是胸腔内部某个位置产生了一瞬微弱的共振。像一根绷紧的弦被轻轻拨了一下。那根弦不在空气里，在肋骨后面。\n\n他睁开眼。房间没变。墙壁、夜灯、天花板上那条干涸河道般的裂纹，都还在老位置。\n\n但感觉不对。\n\n木子韦坐起来，赤脚踩在冰凉的木地板上。客厅很暗，窗外路灯的光从窗帘缝隙里斜进来，在地板上画出两条平行的亮线。\n\n铜镜还蒙着床单。他前几天挂上去的。灰色的轮廓安静地挂在墙上。\n\n他的眼睛掠过铜镜底部——床单的下摆没有贴住镜面。底端向上卷起了两指宽的一条缝。像有人从里面、从镜子的另一面，把布顶开了。\n\n他走近。\n\n缝里透出的光不对。客厅没有开灯，就算镜子能映到什么也该是窗外路灯的淡黄色。但那道缝里渗出来的是白色。冷白色的光。像冬天盖了一层雪的空地，不含任何温度。\n\n他伸出手，捏住床单边缘。\n\n缝里面，紧贴着镜面，一只眼睛正从里往外看。\n\n不是比喻。一只真正的眼睛。\n\n位置完全不对。如果镜子里映的是他，眼睛应该出现在对应高度的位置。可那只眼睛贴在缝的底端，几乎靠在地面上——像一个趴着的人，把脸抵在镜面上，从下往上看。\n\n瞳孔散大。几乎占满整个眼眶。\n\n跟他对视着。\n\n木子韦没有动。手指还捏着床单的边缘。\n\n那只眼睛眨了一下。\n\n他松开手，后退，撞在茶几角上。\n\n床单滑落到地面。铜镜完整地露出来——空的。只映出昏暗的客厅、窗外的光，和他自己站在镜子前方的身影。脸色苍白，赤着脚，一只手半举着。\n\n没有别的什么。没有眼睛。\n\n他弯腰捡起床单重新蒙上去，从厨房抽屉里翻出两个塑料夹子，把床单两侧死死卡在镜框上。夹不紧，铜镜太重。但至少比刚才好一些。\n\n做完这些他把自己关进卧室，被子蒙过头。空气越来越闷。他喘不过气但不想钻出去。\n\n胸口有一种微弱的震动感，从肋骨后面传出来。节拍器一样的频率。他听不见，但每一次震动都在身体内部撞一下。\n\n二十分钟后震动停了。\n\n完全的静止。比震动更令人不安。像走在小巷里身后一直有脚步声，突然没了——你不知道那个人是走了，还是已经站到了你背后。\n\n他把被子拉下来。\n\n天花板正上方多了一块黑色水渍。\n\n之前不在那里。他确定。他盯着那条裂纹看过无数次，这个位置是空白的。\n\n乒乓球大小。圆形。中间比边缘深，像一个瞳孔。\n\n水渍的边缘在往外扩。不是被风吹的——房间里没有风。它自己在一圈一圈洇开。从乒乓球到拳头大小只用了十几秒。\n\n木子韦坐起来。\n\n水渍继续扩张。边缘延伸到天花板上那条裂纹的位置，两条黑线交汇处形状突然改变——变成一个人形轮廓。头、肩膀、躯干。\n\n天花板上趴着一个人影。\n\n他站起来，伸手去按开关。灯没亮。再按一次，还是没亮。不是停电。手机充电器的绿色指示灯亮着，路由器信号灯也亮着。只有灯不亮。\n\n影子从天花板上缓慢地剥离。像墙皮受潮翘起来的状态，只是边缘太整齐了。整块黑色的平面从天花板上分离，背面露出来——不是天花板的水泥面，是另一种黑。更深、更稠的黑。\n\n影子落到地板上。他看到影子接触地面的瞬间，地板的木纹以接触点为中心开始变黑，顺着木板缝隙爬行。像墨水洇进宣纸的纹理。\n\n他的脚还踩在那片正在变黑的区域里。\n\n影子站直，面部朝向他。面部没有五官。光滑的黑色平面。\n\n但它在注视他。和镜子里那只眼睛是同一个东西。他直觉确信。\n\n影子伸出手。手臂的比例和木子韦自己的差不多。同样是五指、同样的长度。只是全黑的，像剪影。\n\n手朝他伸过来。\n\n他想跑，腿不听使唤。不是恐惧到动弹不得——是脚掌贴在地板上的感觉变了。木板变得黏稠，像踩进半凝固的胶水。越用力拔越陷得紧。\n\n影子走到他面前。弯腰。光滑的黑色平面凑近他的脸。\n\n距离近到能闻到味道。不是腐臭，不是血腥。是金属味。像舌头舔了一下放了十年的硬币。\n\n子的面部中间出现了一条裂缝。从左到右横贯整个平面，向上下撑开，里面什么都没有。\n\n然后它把脸埋进了木子韦的胸口。\n\n不是撞击。是渗透。整片黑影从他的前胸缓慢地往里钻，像水渗进一块干海绵。\n\n木子韦感觉到的最后一件事是——\n\n心脏停了。\n\n一秒。两秒。三秒。\n\n恢复跳动。但节奏变了。不是加快。是在每一次正常跳动之间、两次心跳的缝隙里，夹进了一记极弱的额外跳动。\n\n一强一弱。一快一慢。\n\n两个节拍重叠在一起。\n\n## 三\n\n他不知道自己是怎么熬到天亮的。\n\n缩在窗台和床之间的角落里，后背贴着墙，膝盖蜷起。影子钻进胸口之后他就再没动弹。不是不能动，是不敢动。\n\n窗外的天色一层层变亮。深灰、浅灰、淡青、鱼肚白。\n\n他把手放到胸口。心跳在跳——规律地跳。但那一下额外的小心跳还在。很弱，藏在每次心跳和下一次心跳之间。不去感受的话几乎注意不到。\n\n它没有走。\n\n站起来腿有点软。扶着墙走到卧室门口推开门。\n\n客厅的无声变了。以前只是一种缺失，现在有了体积感。像空气密度变了，像水淹到了小腿的位置。他每走一步都能感觉到阻力。\n\n铜镜还蒙着。夹子还在。\n\n他走过去。每迈一步那个额外的心跳就明显一点，像一个藏在身体里的陌生人跟着他的脚步一起走。\n\n站到铜镜前。犹豫了几秒，把夹子一个个摘下来。\n\n床单滑落。镜面映出他的脸。憔悴。眼圈发黑。嘴唇干裂。抬手、点头、皱眉、张嘴。每一个动作都同步。\n\n恢复正常了？\n\n他喉咙动了一下，想笑，扯不出来。准备转身。\n\n镜子里的人比他先转。\n\n他的身体还面向镜子，镜中人已经扭过身躯面朝客厅另一头。镜里的画面跑到了现实的前面。\n\n镜中人接着回过头来看着他。嘴角开始往上牵——不是被外力拉扯的僵硬弧度，是一个完整的笑。嘴角上扬、眼角微皱，很自然，像是在对熟人打招呼。\n\n木子韦没有笑。\n\n镜中人缓缓抬起手，食指放在嘴唇上。\n\n嘘。别出声。\n\n然后笑容消失了。表情变成了一种很深的、像水底石头一样的平静。它转过身，背对着他，往镜子里客厅的深处走去。镜中客厅跟现实中布局一样，但颜色不对——整个空间罩着一层冷色调，像被淡蓝色的玻璃纸遮住了。镜中纵深被拉长了，超出了物理上该有的尺度。镜中人走到大概十米开外停下来，没有回头。\n\n木子韦站在镜子前。镜子里的自己站在十米外背对他。两个人之间隔着一层玻璃。时间失去了意义。\n\n镜中人动了。很慢。身体一点一点地转回来。\n\n五官还在原来的位置。但不对了。不是表情变了，而是更深的东西。那种构成\"这是木子韦\"的内在质地被换掉了。好像有人借了他的脸，穿了他的皮，但里面装着另一颗心。\n\n镜中人嘴角轻轻一挑，短得像错觉。然后抬起手，食指指向木子韦身后的方向。\n\n木子韦没有回头。他的身体拒绝执行这个指令。\n\n镜中人的手没有放下。嘴在动。他听不见，但看得懂口型。两个字，很慢很清楚地重复了三遍：\n\n\"他来了。\"\n\n木子韦猛地转身看镜子。镜中人的嘴换了一个说法。四个字。\n\n\"在、你、身、后。\"\n\n这一次，汗毛全竖起来了。\n\n镜中人的表情从平静变成了恐惧。虽然那张脸不是他的，但那种恐惧太真实了，真实得像他自己正在害怕一样。\n\n他僵硬地、一寸一寸地转过身。\n\n厨房。水槽。灶台。窗户。对面楼灰色的墙面上有一块空调外机。\n\n什么都没有。\n\n他低头。脚下的厨房木地板是浅色的。但他的脚边有一道影子——不对，不止一道。叠着两道影子。一个是正常的淡影，另一个更浓、更黑，像从他自己身体底下渗出来的。\n\n第二道影子比他实际的身体宽了一圈。头部位置多出了一小块突起，像一个人的肩膀旁边又挤进来了另半截肩膀。\n\n两道影子慢慢开始融合。轮廓线软化之后重新凝合。新的影子只有一个头，但比他大了一圈。\n\n镜子里一直看着这一切。表情出现了一种木子韦能够辨认的情绪——悲悯。像一个医生看着一份已经确诊的报告。\n\n木子韦蹲下去了，双手捂住脸，手指插进头发里。\n\n头顶的白炽灯忽然亮了。闪了两下，稳定下来。惨白的光把厨房照得没有一丝阴影。\n\n他的影子消失在地面上。\n\n灯亮的一瞬间，他胸口的两个心跳同时停了一拍。然后恢复。\n\n其中一颗跳得比以前更有力了。\n\n## 四\n\n天亮之后他把所有灯都关了。铜镜重新蒙上床单。这次用了四个夹子，从书房搬来一把椅子挡在铜镜前面。做完这些他坐在沙发上看手机。\n\n他打开搜索软件，输入\"铜镜 怪事\"。风水文章、论坛帖子。没有他需要的。又输入\"听力丧失 幻觉\"。医学论文说听力受损后出现视觉异常和幻触并不罕见，叫做感觉代偿性幻觉。\n\n\"感觉代偿。\"他默念这四个字。也许这就是全部解释了。\n\n胸口那颗有力些的心跳一下一下撞击着内壁。手掌覆上去感受到的节奏是：重、轻、重、轻。\n\n如果这是幻觉，为什么他能摸到自己心跳多了一拍？\n\n他站起来走到窗前，拉开窗帘，阳光涌进来。窗外是对面楼上一面反光的空调外机。\n\n他的眼睛飘向了那点反光。\n\n反光的影像里，窗外站着一个人。就在他窗外——隔着玻璃，在对面的空调外机上——蹲着一个人。\n\n木子韦猛地拉上窗帘。心跳骤停了一拍。深呼吸。一、二、三、四。\n\n伸出一根手指，在窗帘边缘挑开了一条一厘米的缝。只够一只眼睛看出去。\n\n空调外机。灰色的金属外壳反着阳光。上面没有人。什么都没有。\n\n手机震了。他听不到铃声，但感觉到机身在桌面上嗡嗡地震动。拿起手机。未知号码。\n\n他把手机贴到耳朵旁边。无声。他自己本身就是无声的。\n\n但屏幕上的通话计时器在走。对方在讲话。\n\n就在这时，手机贴着他耳朵的那一面传来一种温度变化。脉冲式的温差，像有人从电话那头朝着听筒这侧吹气。一下一下，间隔均匀，和他的心跳节奏同步。\n\n屏幕上多了一个他从未见过的图标——一个很小的方形，里面画着一面镜子的形状。\n\n通话时间跳到0:30。\n\n然后一种新的感觉出现了——他的耳蜗，那个已经彻底死亡的耳蜗，深处某个理论上不该还有功能的位置，传来了一阵微弱的震动。不是声音，是震动。像有一个人，在很远的地方，用手指在玻璃上写字。\n\n震动的频率有规律。三短，三长，三短。\n\n图标在动。不是静态动画，是整个镜像在镜面里慢慢翻转。\n\n三十秒后通话断了。屏幕回到桌面。镜子图标消失了，像从来没有出现过一样。通话记录里没有这个号码的痕迹。\n\n但木子韦的耳蜗深处残留着最后一次震动的感觉。\n\n那不是SOS。\n\n三短，三长，三短。\n\n那个节奏。\n\n跟他心跳里面那个额外的心跳一模一样。\n"}, {"title": "第二章_日记", "content": "# 诡镜 · 第二章：日记\n\n## 一\n\n陈明的出租屋被封了三天。\n\n老狼用局里的封条把门贴了，跟物业说\"线路检修\"。老旧的筒子楼物业管理本就松散，谁家贴张纸条，别人就当没看见。\n\n三天里他进去过两次。\n\n第一次只是看。什么都没动。走了二十分钟，记住了所有东西的位置。沙发上的凹痕、茶几上水杯的印渍、卧室枕头凹陷的角度。\n\n第二次带了工具箱。\n\n他先拍照——铜镜正面、左倾十五度、右十五度、镜面边缘特写。然后才是其他东西。\n\n厨房：空的。冰箱里只有半瓶老干妈、三个鸡蛋、一把挂面。水槽是干的。水龙头拧紧的。\n\n卫生间：毛巾发硬，牙刷干的，马桶干净。没人住的卫生该有的样子。\n\n卧室：床铺整齐得不像有人在睡。但枕头上有一根头发。白的。很长。不是陈明的。陈明是短发。\n\n老狼把头发用镊子夹起来放进证物袋。\n\n然后他看到了床头柜上那部碎屏手机。和旁边那本笔记本。\n\n手机碎屏但不是摔碎的——屏幕是从中心向外辐射的裂纹，像被什么东西从内侧顶开的。SIM卡取出来了，放在手机旁边。\n\n他打开笔记本电脑。需要密码。试了陈明身份证号后六位——不对。试了\"19890000\"——不对。试了\"000000\"——不对。\n\n试了\"jingzi\"——进去了。拼音。\"镜子\"。\n\n桌面上只有三个文件。一个音频，两个视频。\n\n## 二\n\n先开的音频。\n\n文件名\"最后一天.mp3\"。四分三十七秒。\n\n前二十秒是杂音。老狼以为是录音质量差。但有经验的人听得出来这不是杂音——是有人在说话，但声音极低，低到接近次声波。像是有什么东西贴着话筒在呼吸。\n\n第二十秒，陈明的声音出现了。\n\n\"第十一天。我知道我快不在了。\"\n\n声音很平静。不是恐惧。是被反复折磨太久、已经到了某种近乎麻木的平静。\n\n\"最开始我以为只是压力大。镜子里的自己慢了半拍，我以为眼花了。第三天，镜子里的我不看我了。它看我后面。我看不到后面有什么。但每次我站在镜子前面，后面头发根就发凉。\"\n\n一阵停顿。背景音里有一种轻微的摩擦声，像是有人用指甲刮玻璃。\n\n\"第七天，它开始动了。我没有动。它动了。它抬了手。我把手放在兜里了但它还是抬了。我看到它的脸——是我的脸，但不是我。更老。更薄。像一层皮。\"\n\n陈明的声音在这里抖了一下。不是恐惧。是厌恶。\n\n\"它笑了。我没有笑。那笑容不是人笑。是嘴两边肌肉被什么东西向外硬扯出来的。它笑了三秒，然后用我的口型说了两个字。\"\n\n停顿。很长。\n\n\"那两个字我不告诉你们。怕你们也听到了。\"\n\n背景里的刮玻璃声变大了。频率在加快。像什么东西在催促。\n\n\"第九天，它开始说话了。我听不到声音。但我能感觉到它的声音在我脑壳里面震动。有人用指甲在脑子里写字。它说了一句话。我记下来了，但我不会告诉任何人。\"\n\n\"今天——第十一天——它要走了。不是走。是它走。它要从这具身体里面走出来。用我的脸。用我的声音。用我的手去开门。\"\n\n\"如果你听到这段录音，说明它已经成功了。\"\n\n\"不要看镜子。不要回应。不要叫它的名字。\"\n\n陈明的声音忽然低了下去。像隔着很远的水面在说话。\n\n\"还有——不是只有我一个。还有其他。我在那个论坛里看到他们。十。不对，更——有人数过。十四个。或者十五个。我不知道。但我们都看了那面镜子。都听了那个声音。\"\n\n\"它们在数。数到十四——或者十五——的时候—\"\n\n录音在这里被一阵高频的尖啸打断。像是金属在玻璃上刮擦的声音。\n\n录音结束。\n\n四分三十七秒。\n\n没有背景里的刮玻璃声在最后一刻变得更近了。像是那个东西——已经贴到了话筒上。\n\n老狼把音频关掉。\n\n他的左手背上一道铜绿色的纹路从指甲缝爬到了手背中间。\n\n是刚才碰了陈明床头柜留下的。柜子表面有一层薄薄的绿色粉末，像铜锈。不痛不痒。但洗不掉。\n\n他看了一眼墙上那面被布蒙着的铜镜。\n\n布没有动。\n\n但布的底端，跟陈明视频里拍到的位置一样——卷起了一条缝。\n\n缝里面是暗的。\n\n## 三\n\n然后他打开了第一个视频。\n\n文件名\"第十天.mp4\"。十七秒。\n\n画面摇晃——手机被随意放在桌上拍到的角度。客厅一角：沙发、茶几、墙面的铜镜被床单蒙着。前八秒什么都没发生。只有偶尔有光线变化，像有人在镜头前来回走。\n\n第九秒。铜镜底部的床动了。不是被风吹。它从下面被慢慢顶起来。像有东西从镜子里往外推。\n\n一条缝。\n\n缝里面不是黑暗。冷白色的光。\n\n第十秒。一只手从缝里出来。\n\n不是伸。是渗。像液体一样从缝外漫出。手指、手掌、手腕。黑色的。光滑的。没有纹理。像剪影。\n\n悬在半空。停了。\n\n五根手指开始动。在空画。在圆心点了一下。\n\n同心圆。圆心的眼睛状。\n\n第十二秒。手收回去了。缩回了那条缝里。床单落回原位。画面恢复平静。\n\n老狼把视频拉到十三秒。停下。放大那个手的部位。\n\n不是手腕后面有一张脸。很小。缩在缝的深处。像一个人把头贴在猫眼的洞里往外看。\n\n那张脸的表情是——好奇。\n\n像一个孩子在观察一只蚂蚁。\n\n老狼关掉视频。\n\n他站起来，走到铜镜前。床单还蒙着。他掀开一角——只露出一条缝。\n\n里面是暗沉的铜色面。出他半个脸。正常。\n\n一秒、两秒、三秒。\n\n然后——\n\n镜面深处，他的倒影后面，多了一个影子。\n\n矮。很小。像小孩的身形。站在他倒影的右后方。\n\n老狼猛地回头。\n\n身后什么没有。\n\n再看镜子。\n\n消失。影子里的自己。正常。\n\n但他的倒影——老了。\n\n不是光线的错觉。是皮肤。镜面里他的脸比实际的他老了十岁。眼角多了更深的皱纹，鬓角白了，嘴唇变薄了。\n\n像十年后的自己。\n\n那个倒影的嘴角微微动了一下。\n\n不是他在笑。是镜子里的自己在笑。\n\n然后他的手机响了。\n\n没有号码显示。\n\n他接起来。\n\n对面安静了三秒。\n\n然后传来一个声音——是他自己的声音。但老了。像是从他自己的嗓子里发出来的，但他没有说话。\n\n那个声音只说了一字：\n\n\"来。\"\n\n电话断了。\n\n老狼看向地。\n\n他的脚边。水泥地面上有一道水渍。\n\n淡淡的铜绿色。\n\n方向不是从外面进来的。门关着。锁好的。\n\n是从铜镜的方向延伸过来的。\n\n从镜子的另一面渗出来的。\n\n蹲下来。伸手指沾了一点。\n\n不凉。是一种刺痛。像碰到了极酸的液体。\n\n缩回手。放到鼻子前闻了闻。\n\n金属味。\n\n跟木子韦报告里描述的一模一样。跟陈明录音里刮玻璃的声音一样的味道。\n\n他把证物都装好。手机、笔记本、证物袋里的头发、照片、音频备份。铜镜他没动，重新用布蒙好，加了三层胶布。那面镜子太重了，搬运需要专业设备。而且不确定搬离这个房间会不会触发什么。\n\n锁门。下楼。\n\n出筒子楼的时候，天已经暗了。雨下得比早上更大。\n\n后备箱。发动车。\n\n从后视镜里看了一眼。\n\n后排座椅上多了一个影子。\n\n矮小。模糊。像一个孩子。\n\n老狼猛转回头。\n\n空。\n\n再看后视镜。影子消失。只有空的座椅。\n\n但他左手背上那道铜绿色纹路——已经到了手腕。像一条银色的藤蔓。\n\n不痛不痒。\n\n但能感觉到它皮肤下面在微微蠕动。\n\n像有什么东西在血管里游动。\n\n发动车。雨刮开水面。\n\n灯照亮了前面的路面。\n\n在路灯的光里，他到了路面上有一道铜绿水渍。\n\n从他车的位置，一直延伸到前面——一直延伸到他家的方向。\n\n像什么种子已经在身体里种下了。从两个地方同时开始。\n\n像什么种子已经在身体里种下了。从两个地方同时开始。\n\n他不知道的是，在他离开陈明出租屋的那一刻那面铜镜的床单底——那条缝——变宽了一指。\n\n从两指宽变成了三指。\n\n像是有什么东西从里面把它撑开了，又缩了回去。\n"}, {"title": "第三章_失踪", "content": "# 诡镜 · 第三章：失踪\n\n## 一\n\n独居女性的案子发生在西城区。\n\n一月的一个早晨，邻居报了警。说闻到异味。警察破门进去的时候，赵秀芳坐在梳妆台前——面朝镜子，双手平放在膝盖上。坐姿端正。表情平静。\n\n死了。\n\n法医的判断是心源性猝死。没有外伤。没有中毒。没有挣扎的痕迹。像是坐在那里，心跳忽然就停了。\n\n老狼在卷宗里看到现场照片的时候，目光停在了梳妆台上。\n\n那是一面老式的木质梳妆台。镜子是椭圆形的，铝合金边框。镜面上盖着一块红布。不是随意盖的——布的四个角被仔细地掖在镜座下面，塞得很紧。像一个怕镜子里的东西跑出来的人做出的举动。\n\n但红布的中心有一个隆起。圆形的。像是有什么东西从镜子的另一面顶了出来。\n\n老狼把那页卷宗抽出来，放进公文包。\n\n下午两点，他去了赵秀芳的公寓。\n\n三楼。302。封条还在。他用备用钥匙开了门。\n\n一股霉味涌出来。冬天的暖气太足，尸体搬走后房间一直没通风。\n\n老狼戴了口罩和手套。客厅、厨房、卫生间——一切正常。最后进了卧室。\n\n梳妆台还在原来的位置。\n\n红布还在。塞得紧紧的。中心的隆起比照片上更明显了。\n\n他没有碰布。退了一步，环视房间。\n\n床头柜上放着一部老年机。他拿起来看了看——通话记录是空的。通讯录只有三个号码：女儿、社区、医院。\n\n他打开相册。\n\n只有一张照片。拍摄日期：1月3日。死者死亡前一天。\n\n照片里是梳妆台。红布松了——没有塞紧。底端翘起一条缝。缝里面是镜面。镜面上映着什么。\n\n老狼放大了看。\n\n模糊。像素太低。但他能辨认出一个轮廓。\n\n不是赵秀芳的卧室。是另一间屋子。更暗。天花板上有一根横梁。梁上挂着什么——像是几串铜质的东西。铜钱？铜铃？不确定。但可以肯定的是，那不是这个房间的景象。\n\n镜子映出了别的地方。\n\n他把照片存到自己的手机里。老年机放回原位。\n\n然后他看向梳妆台。红布中心的隆起。\n\n他伸出手——没有掀开布——用手背隔着布轻轻按了一下。\n\n硬的。不是布料。也不是木头。是一种冰冷的、坚硬的触感。像金属。但镜子在木框里，布外面还隔着一层玻璃。除非——\n\n他掀开了红布的一个角。\n\n镜子后面的玻璃被卸掉了。木框后面是一个暗格。暗格里嵌着一面铜镜。\n\n缠枝莲纹。\n\n比木子韦家和陈明出租屋的那面小一些。镜面更暗，几乎是黑色的。边缘没有\"观汝即见汝\"。\n\n刻的是另外三个极小的字。老狼把手电凑近了才辨认出来：\n\n\"引、路、人。\"\n\n引路人。\n\n不是镜子本身的名字。更像是一个称呼。某种特定用途的镜子。\n\n老狼用镊子轻轻碰了一下镜面边缘。\n\n镜面发出一声极轻的嗡鸣。像金属被敲击后的余音。但声音不是从镜面传来的——\n\n是从他身体里面。\n\n一阵微弱的震动，从指尖沿手臂往上爬，经过肩膀，到达胸口。胸口的心跳漏了一拍。就一拍。然后恢复正常。\n\n老狼猛地缩回手。\n\n右手食指指——尖刚碰到镜面的那个位置——出现了一道极细的红线。从指尖向手掌方向延伸了不到一毫米。像毛细血管破了。但血没有流出来。红色在皮肤下面，慢慢变淡，然后消失了。\n\n盯了五秒。\n\n然后他做了一件事：把铜镜从暗格里取出来，装进证物袋，再放进防震箱。锁好。\n\n走出公寓的时候是下午四点。楼道的灯忽明忽暗。走到二楼的时候，手机震了一下。\n\n未知号码。短信。\n\n*\"你不该碰引路人的镜子。\"*\n\n老狼抬头看二楼走廊的窗户。玻璃上映出他的倒影。\n\n倒影里，他左手食指上多了一道红线。跟他右手刚才出现的一模一样。\n\n但他的左手根本没有碰过镜子。\n\n老狼盯着倒影看了两秒。转身下楼。没有回头。\n\n但他能感觉到，二楼走廊的玻璃后面有一双眼睛在看他的背影。\n\n## 二\n\n走出公寓楼的时候天已经暗了。冬阳落早。街灯亮起。\n\n老狼走到车前。打开后备厢，把防震箱放进去。然后坐进驾驶位。\n\n从后视镜。\n\n正常。同步。但边缘有一道极细的铜绿水渍。像有人用沾了铜锈的手指擦过镜面。\n\n老狼的右手指尖又开始隐隐作痛。\n\n那道已经消失的红线，在皮肤下面重新浮现了一瞬。颜色比之前更深。\n\n他把手握紧。发动车。\n\n从陈明的出租屋到赵秀芳的公寓。两个案发现场。同一种铜镜。\n\n但区别：陈明那面刻着\"观汝即见汝\"——是观察者用的。赵秀芳这面刻着\"引路人\"——是引路用的。\n\n一个是镜子。一个是通往镜子的路。\n\n手机又震了。未知号码。\n\n*\"两个已经标记。第三个在等你。\"*\n\n老狼踩了刹车。\n\n路边停着一辆黑轿车。车窗映出他的车灯。车窗玻璃上映出了一张脸。\n\n不是老狼的。老人。矮小。瘦削。灰白头发。满脸皱纹。\n\n那张脸在玻璃反射里停留了两秒。然后消失了。\n\n黑色轿车里没人。空的。但玻璃上还残留着一丝铜绿色的印子。像一个指纹。\n\n老狼重新踩油门。手心出汗。\n\n第三个在等你。\n\n第三个铜镜。第三个被标记的人。\n\n回到市局大楼是晚上七点。\n\n地下三层。走廊灯管闪。镇流器老化，每秒三次。\n\n老狼把防震箱带进办公室。打开。\n\n镜面是黑的。不反光。像把所有光线都吸进去。\n\n他拿出笔记本——陈明那本——翻到最后两页。那两行工整得不像人写的字：\n\n*\"他。已经不在了。现在是。我。\"*\n\n然后把这两个字放在一起看。\n\n引路人。是不是说铜镜里的\"那个东西\"需要一个引路人才能从镜子里来到现实世界？赵秀芳的铜镜不是用来照的。是用来引路的。\n\n那引路的终点在哪？\n\n他打开抽屉。牛皮纸袋。红色标记：不可收容。\n\n张岱笔记抄本翻到最后一页。之前被忽略的一行极小的批注。字迹太淡，几乎透明。台灯开到最大，斜着照。\n\n字迹慢慢显出来了：\n\n*\"引路人有七。各有其职。第七人称鬼母，居城西。以红帕覆镜，以血饲之。\"*\n\n第七人。鬼母。居城西。\n\n赵秀芳的公寓——西城区。\n\n红帕覆镜。赵秀芳梳妆台上的那块红色布。\n\n以血饲之。\n\n他翻开赵秀芳案的尸检报告。死因是心源性猝死。但补充说明里有一行小字：\n\n\"死者左手食指有针孔状伤口，疑似死后形成。伤口周围有微量铜绿色残留。\"\n\n不是死后的伤口。是饲喂的痕迹。有人——或者有东西——用赵秀芳的血在\"饲喂\"那面引路人的镜子。\n\n赵秀芳自己可能不知道。或者知道，但没反抗。\n\n老狼合上文件。\n\n看向桌上那面铜镜。镜面还是黑的。不反光。\n\n但在镜面最深处，极远极远的地方，有一道极微弱的光闪了一下。\n\n红色。一闪即逝。\n\n老狼的手指又开始隐隐作痛。\n\n左手食指上，那道已经爬到指根的红线又往上长了一截。到了手背中间。\n\n像植物的根须在往血液里扎。\n\n不痛不痒。但能感觉到它在皮肤下面微微蠕动。\n\n像有什么东西在往里面走。\n"}, {"title": "第四章_收容站", "content": "# 诡镜 · 第四章：第九收容站\n\n## 一\n\n佳丽比所有人都先到。\n\n从不迟到。不是守时的问题，是早起。每天早上五点半，跑五公里，冷水澡，七点前到岗。\n\n岗在市局大楼地下三层。\n\nB3的空气永远是冷的。不是空调，是钢筋混凝土和铅板蓄积的冷。走廊尽头铁门永远锁着，贴了发黄纸条：\"档案管理处—非请勿入。\"\n\n推门进去。\n\n十二平米。三张桌子。最里那张老狼的——永远堆着文件，那杯茶永远是黑的。中间那张空了三年。没有名字，但佳丽每天在上面放一杯水。最外面那张是她自己的。桌面干净。一台电脑，几本文件夹。\n\n先开电脑。登暗网私人论坛。\n\n用局的虚拟机，IP三层跳转。对方防备更严——论坛每三分钟刷新访问密钥，不输新密钥自动断。\n\n\"鉴镜录\"。名字文雅。内容不。\n\n只有一种帖子：照片。铜镜。不同角度，不同光线。有人拍缠枝莲纹特写，有人拍镜面反射的影像，有人拍镜子被各种东西遮挡后的样子——蒙布，胶带，铅板。\n\n帖子没有标题，没有文字。只有照片和\"价格\"。\n\n\"价格\"不是钱。是次数。\n\n每条帖子下面有个计数器。每打开一次帖子里的照片，计数器加一。\n\n\"看\"就是买。你看了照片，等于照了铜镜。照了，就被看到。\n\n佳丽查过登录记录。论坛里注册了十四个账号。九个注销。五个还在活动。\n\n她用局里技术追踪这五个账号的IP。全部经境外跳转，至少套五层代理。但有一个——最活跃的那个——在跳转的第三层有一个IP残留。\n\n本市。城东。\n\n把那个IP位置标地图上。\n\n然后点开那个账号发的最新一张照片。\n\n照片里铜镜映出一间房间——铁架子床，塑料椅子，墙上褪色的奖状。城中村出租屋。\n\n但角落里，镜子映出了拍照的人。\n\n一个人影。坐在铁架子床上。面朝铜镜。低着头的。\n\n放大。\n\n那个人右手搭在膝盖上。手腕的位置有一圈铜绿色。不是戴了镯子。颜色是活的。\n\n铜绿色在从手腕往手臂上方蔓延。\n\n佳丽手指停在鼠标上。\n\n这个人的铜化速度比木子韦快得多。木子韦用了十一天才到手臂中段。这个人——已经蔓延到了肘部以上。\n\n保存，加密，上传。\n\n关掉电脑。巡检。\n\n## 二\n\n第九收容站在办公室右侧通道后。\n\n虹膜扫描。绿灯。通道十步。气密门。密码加虹膜双验证。\n\nB3夹层。\n\n四十七个隔间。每间约三平米。四面半米厚钢筋混凝土，内壁贴铅板。门是气密门，从外开，里没有把手。门正面一块玻璃——三层夹胶防弹玻璃中间灌水银。能清里面，里面看不见外面。\n\n从第一间开始。\n\n1号到10号：E级和D级物件。雕花木梳，绣符布的布幔，一面传说能\"照见前世\"的碎镜片，还有桃木簪子。全正常。\n\n11号。C级。明代黄铜小镜。编号C-0011。镜面上刻着\"长乐未央\"四个字。\n\n站在玻璃前定。\n\n黄铜小镜放在石台上。安静。没有发光。镜面倒影是正常——映出天花板。\n\n但注意到一件事。\n\n黄铜小镜旁边——石台上多了什么东西。\n\n凑近玻璃仔细看。\n\n一根头发。白的。很长。\n\nC-0011密封的。气密门从外开。里面没有通风口。头发不可能进去。\n\n除非——\n\n隔间内部的天花板上有一滴水珠。\n\n水滴落下来。落在石台上。溅在白色头发旁边。\n\n颜色是——铜绿色。\n\n后退了一步。打开巡检记录本，在C-0011那一栏写：\"内部出现白色头发一根，来源不明。天花板有不明水珠。疑似渗漏。建议排查夹层结构。\"\n\n往后走。\n\n20号到30号。C级为主。一尊眼睛会转的铜佛像，一面映出不同季节景物的铜镜，一块能吸收声音的黑色石头。\n\n317号。B级。\n\n宋代铜镜。缠枝莲纹。来自农村集体癔症案。三十七户人家十九人精神失常。全部在墙上画同心圆。圆心是一只眼睛。\n\n在三分钟。\n\n放在隔间正中央的石台上。镜面朝上。没有任何光源的情况下，镜面发出极低亮度的暗红色光。\n\n像在呼吸。\n\n但今天，铜镜的暗红色光比上个月强了些。不是明显变强。那种如果你每天都看它就能注意到的细微变化。\n\n光脉动的频率大概是每分钟七次。上个月是六次。\n\n频率快了。\n\n记录本上写：\"C-0317暗红光亮度轻微增强。脉动频率由每分钟六次变为七次。原因待查。\"\n\n继续往后走。\n\n到47号隔间——空的。唯一空的隔间。原本准备用来放C-0317——宋代铜镜，但C-0317放不下。因为它不是\"物件\"。\n\n是\"门\"。\n\n编号S-002。不在B3夹层。在更深的地——B4下。\n\n佳丽没有权限去B4。只有老狼和科长有。\n\n她只知道B4有两个隔间。S-001和S-002。\n\nS-001的信息是加密的。她只听说过一个传闻——三年前，陈默失踪前最后一次去B4，在S-001前面站了很久。出来的时候手在抖。嘴里只说了一句话：\n\n\"那个东西，有手。\"\n\n佳丽当时不理解。收容站里的每一个东西都有\"手\"。铜镜的手，铜像的手，木梳的手——都物件的一部分。\n\n但陈默说那句话的语气不是\"它有一只手\"。\n\n而是——\"它。有。手。\"\n\n像在一件不应该有手的东西，长出了手。\n\n站在47号空隔间的玻璃面前。\n\n玻璃里映出她自己。短发。冲锋衣。战术靴。腰间的短棍。\n\n正常。\n\n但玻璃映出的她的脸——\n\n眼角下面多了一颗痣。\n\n佳丽没有那颗痣。\n\n指尖摸了一下眼角下面。皮肤光滑。没有凸起。\n\n再看玻璃。那颗痣还在。铜绿色的。极小的一粒。\n\n像头发髓质层里那种极小的镜面反射。像一颗种子。\n\n在皮肤下面微微闪烁。\n\n像一只眼睛睁开了一条缝。\n\n一拳砸在玻璃上。三层夹胶防弹玻璃中间灌水银，能挡步枪子弹。玻璃纹丝不动。但拳头上沾了一点铜绿色的粉末。\n\n从玻璃表面刮下来的。\n\n低头看自己的拳头。指关节处的皮肤下面有一丝极淡的铜色的纹路。\n\n像血管。但颜色不对。\n\n不痛不痒。\n\n走。\n\n## 三\n\n回到办公室。证物袋放在桌上。棉签，手印样本，头发。\n\n把暗网那张铜化手臂的照片和收容站C-0011里的白色头发放在一起比对。\n\n放大。头发放大。两个放在一起。\n\n白色的。很长。髓质层里有微小的镜面点。同一根头发。或者同一个来源。\n\n暗网买家的照片里——那个头发出现在一个密封的C级隔间里。\n\n靠在椅背上。闭上眼睛。\n\n脑海里出现了三个画面——\n\n暗网照片里手臂铜化的陌生人。\n\nC-0011隔间石台上那个白色头发。\n\n还有玻璃上她脸眼角下面那颗铜绿色的痣。\n\n三个看似毫无关联的点。连在一起——\n\n有人在通过暗网的镜子照片，把铜化传播给看照片的人。有人在通过白色头发，把异常传播进收容站内部的隔间。\n\n而她的脸——有什么东西在她照镜子的时候种下了种子。\n\n睁开眼。打开抽屉。从里面拿出一面小镜子。普通的那种化妆镜。\n\n照了一下。一秒钟之内。眼角下面的那颗痣还在。但镜子里比肉眼看更明显了。铜绿色的光点在皮肤下面微微闪烁。\n\n像一只眼睛在皮肤下面睁开了一条缝。\n\n把镜子翻过来，扣在桌面上。拿起电话。拨老狼的内线。\n\n\"狼哥。\"\n\n\"说。\"\n\n\"暗网那边查到点东西。有一个人——手臂铜化到了肘部以上。比木子韦快得多。\"\n\n\"位置？\"\n\n\"城东。IP指向城中村。但我需要当面确认。\"\n\n\"一个人去？\"\n\n\"去不了。那个人已经被标记了。镜化速度极快。接近完成。\"\n\n电话那头沉默了两秒。\n\n\"等我。我下午过来。带Zack一起。\"\n\n\"Zack是谁？\"\n\n\"一个能看见我们看不见的东西的人。\"\n\n电话挂了。\n\n佳丽放下听筒。看了一眼桌上的那面扣着的镜子。镜子下面的桌面上——镜框和桌面之间有一条极窄的缝。\n\n从缝里面，透出一线极微弱的白光。冷白色的。像冬天盖了一层雪的空地。\n\n翻过来。扣在桌上。\n"}, {"title": "第五章_特殊的人", "content": "# 诡镜 · 第五章：特殊的人\n\n## 一\n\n老狼坐在车里等雨停。\n\n二手桑塔纳。左边雨刮器坏了三个月。右边玻璃糊一层水膜。他习惯只用左边看路。\n\n跟人一样——不需要看清所有东西。看清你需要看清的就够了。\n\n左臂搭在车窗上。盯着对面筒子楼三楼右边的窗户。\n\n\"狼哥，目标还在里面。\"对讲机里佳丽的声音。干脆利落。\n\n\"看到了。你那边怎么样？\"\n\n\"后门盯住了。窗户太小钻不出。他只能走正门。\"\n\n对讲机又响。\n\n\"狼哥，目标动了。\"\n\n老狼直身。三楼窗户亮灯。\n\n\"几个人？\"\n\n\"一个影子。在收拾东西。动作很急。\"\n\n要跑。\n\n推开车门。雨打在肩上，凉的。从后备厢拿出一把黑色长柄伞——伞柄实心钢棍，一头磨成锥状。佳丽起的绰号叫\"狼牙\"。\n\n筒子楼没灯。楼梯石阶长水苔。走得很轻——脚掌先着地再过渡到脚跟。\n\n到三楼。走廊尽头门缝透灯光。\n\n里面有声音。翻箱倒柜、拉链、低声咒骂。不压声音了——觉得没人知道他在哪。\n\n老狼听了三秒。指关节敲了三下。\n\n声音戛然而止。\n\n像一首歌被按了暂停键。老狼皱眉——敲门声隔着门不该听得这么清楚。除非那个人一直在门口听着。\n\n右手握紧伞柄。肩膀往前一沉——\n\n门开了。虚掩的。插销扣不紧。\n\n闪身进去。没开灯。月光路灯光从窗帘缝渗进来。\n\n沙发、茶几、电视柜。\n\n没有人。\n\n三秒扫完。一个成年人三秒内从二十平米密闭客厅消失。后门被佳丽盯着。窗户太小出不去。\n\n厨房。空。\n\n卧室。床铺整齐。床头柜上手机碎屏。旁边笔记本翻开，第一页一组组同心圆，每个圆心一只眼睛。\n\n再翻。后面内容变了。文字。越写越潦草：\n\n*第一天。镜子慢了。*\n*第三天。镜子里的我不看我。*\n*第七天。它对我笑了。*\n*第九天。它开始说话。*\n\n后面失控。笔画变长手发抖。最后两行忽然变工整，像换人写的：\n\n*\"他。已经不在了。现在是。我。\"*\n\n老狼手停在那两行字上。\n\n卫生间。门锁了。伞柄锥端戳两下，锁体崩出来。空。\n\n三秒蒸发。\n\n回到客厅。目光落在墙上铜镜上。\n\n缠枝莲纹。镜面暗沉铜色。跟站里317号一样。跟木子韦家一样。\n\n走近。镜面边缘极细刻痕，手电斜打才看清——\n\n\"观汝即见汝。\"\n\n没碰。戴手套。拍三张。全景图里床单底部翘起一条缝，缝里有眼睛从里面往外看。\n\n红外扫描——**镜面后方非标准空间结构。深度无法测定。B级以上。**\n\n镜中影像手里的伞掉了。真正的他还握着。影像低头捡伞，动作迟缓像水下。举起来看着他。\n\n嘴角裂开。不是老狼的表情。\n\n老狼抬脚踩下去。\n\n影像表情变愤怒。转身走。三步后回头看了一眼。消失。\n\n镜框侧面写编号：P-0403-UNR。\n\n\"佳丽。目标不见了。\"\n\n\"什么？我盯后门的！\"\n\n\"三秒蒸发。先回去说。\"\n\n出门时余光扫过镜面——镜里他走了很远，远超这面镜子能照的距离。\n\n## 二\n\n市局地下三层。走廊窄。墙壁发黑。灯每秒闪三次。\n\n办公室十二平米。佳丽已经在了。\n\n\"查了。陈明。假身份证。指纹没有。现金付租。房东说夜里听到他说话——像和尚念经更快更急。\"\n\n\"铜镜不是他带的。搬进去就在。上一个租客老太太住了四年，说镜子本来就在。再往前七八年租客都提到了它。\"\n\n\"镜子等在那里。等某个人来照。\"\n\n安静几秒。老狼把笔记本推过去。\n\n\"看这个。\"\n\n佳丽翻完同心圆到失控到工整的那两行，脸色变了。\n\n\"最后两行——笔迹完全变了。\"\n\n\"不是他写的。\"老狼说。拿手机放视频。\n\n十七秒。前八秒没事。第九秒床单从下面被顶起来。冷白光。第十秒手从缝里渗出来，黑色光滑无纹理。在空中画同心圆。圆心点了一下。第十二秒收回。\n\n佳丽的手机在桌上，黑色屏幕映出她的脸。她盯了两秒，默默翻过来屏幕朝下。\n\n\"跟笔记本第一页一样。\"\n\n\"陈明在镜子里看到然后照抄的——还是那个东西画给他看的？都有。\"\n\n老狼从抽屉最底下拿出牛皮纸袋。四个字红笔写：不可收容。\n\n佳丽打开。张岱笔记抄本。夺舍玄鉴。\n\n\"你看过。但这页你没注意。\"\n\n指着最后批注：*\"镜中之影非投射，乃异界之魔。待异化功成，生人化影，归于镜内虚无，从此世间。唤名：应者为人，不应为影。\"*\n\n\"叫他的名字。应了是人。不应——\"\n\n\"影子。\"\n\n\"木子韦——\"\n\n\"到第四步之前还能喊回来。\"\n\n窗外雨停了。\n\n老狼站起，走到城市地图前。红色图钉十二个位置。他拿起第十三枚——陈明出租屋——按上去。\n\n\"需要第三个人。\"\n\n\"Zack。\"\n\n\"他家族干这个比我们早得多。晚清就开始。祖父手稿里关于夺舍玄鉴的记载全在里面。\"\n\n黑色名片。正面手写：Zack。背面小字：*若镜中有非汝之影，撕此名片。*\n\n铃声响一下就接了。\n\n\"Zack。\"\n\n\"铜镜。缠枝莲纹。木子韦还在。双重心跳。第十一天。\"\n\n对面安静两秒。\"他还活着——听不见。没有听觉通道，传播速度被拖住。但你们要快。我祖父记录里，第三步到第四步最快三天。\"\n\n\"我两个小时到。提醒——'观汝即见汝'。你们看到它的时候它也在看你们。任何反光面。今天去过的地方用过的玻璃金属——全检查一遍。\"\n\n电话挂。\n\n佳丽低头看了看自己手机——屏幕黑了映出她的脸。翻过来。\n\n出门时走廊灯在她身后闪了两下。灭了。\n\n老狼站在门边听着——走廊里传来脚步声。不是佳丽的。很近。很慢。\n\n门外停住了。门缝底下的光被一道黑影挡住。\n\n有人弯下腰。脸贴门缝往里看。\n\n门缝高五厘米。除非脸几乎贴着地面。\n\n黑影停三秒。脚步声往反方向走远。\n\n推开门。走廊空。灯自己灭的。\n\n地面上一道水渍。铜绿色。淡淡的。从楼梯口延伸到门前停住。\n\n像有什么东西从楼下走上来。到他门前。停了。走了。\n\n老狼蹲下，手指沾了一点。刺痛。像碰到极酸液体。闻了闻——金属味。跟木子韦描述影子靠近时的味道一模一样。\n\n退回办公室。门关上手帕擦手指，布被腐蚀成黄褐色。装进证物袋写了一行字：*0402-走廊。未知液体。与目标描述气味一致。*\n"}, {"title": "第六章_Zack", "content": "# 诡镜 · 第六章：Zack\n\n## 一\n\nZack梦见一个人。\n\n不是第一次了。连续三晚。\n\n梦里，一个人站在一面铜镜前面。铜镜被蒙着床单。床单底下有条缝。冷白色的光从缝里渗出来。\n\n那个人听不见光。但他身体里有一个额外的跳动。重的、轻的。重的、轻的。\n\nZack在梦里知道那个人叫木子韦。不是谁告诉他的。是梦直接塞进他脑子里的——像一个记忆被强行放了进来。\n\n梦里，木子韦站在铜镜前面。镜子里的自己站在十米开外背对着他。\n\n镜中人慢慢转过身。\n\nZack看到那张脸的瞬间，醒了。\n\n满身是汗。凌晨三点十二分。\n\n他坐起来，没有开灯。坐在床沿上，深呼吸。\n\n右手的手掌翻过来。掌心朝上。\n\n在黑暗里，他的右手掌纹几乎看不见。\n\n皮肤光滑。像婴儿。没有任何纹理。\n\n三十年前，他的祖父用这只手摸过一面铜镜。缠枝莲纹。之后就再也没有掌纹了。祖父说，镜子\"吃\"掉了他的纹路。\n\nZack的手，生来就没有掌纹。\n\n不是遗传。是标记。\n\n祖父在死前把一本手稿和一枚铜钱留给了他。手稿里写了一句话：\n\n*\"此血已污。此眼已开。后世子孙，生而无纹。见镜知影。\"*\n\n他的血脉里有一种东西。不是超能力。是诅咒。是三十年前那面铜镜留在他们家族基因里的一粒种子。\n\n他从小就能\"看到\"一些别人看不到的东西。\n\n不是鬼。不是幽灵。是频率。\n\n他能感觉到某些空间里存在的异常频率——像有人用极低音量的喇叭在播放某种低频信号。普通人听不到，但他的骨头能感知道。\n\n他三岁的时候，第一次感觉到。\n\n家里的洗手池。不锈钢的。他站在洗手池前面，感觉到洗手池表面有一种微弱的\"嗡嗡\"声——不是声音，是震动。他把手放在水龙头上。金属表面映出他三岁的小脸。\n\n镜面里，他看到了另一个自己。不是倒影。是另一个东西。站在他的倒影后面。比他的倒影高出一截。\n\n他哭了。\n\n祖父来了。把洗手池拆了。换了一个陶瓷的。\n\n但那天晚上，祖父在书房里写了一整夜的手稿。\n\n*\"它开始寻找后代了。\"*\n\n那句话Zack直到十二岁才看懂。\n\n\"它\"不是指某个具体的异常物件。是指异常本身——那些东西在被发现之后，会试图寻找新的宿主。不是人。是血脉。被标记者的后代。\n\n祖父被标记了。Zack的掌心纹消失了。Zack的父亲——Zack从没见过他——据说是\"意外溺亡\"。但他的尸体在水里泡了三天才被发现，全身的皮肤变成了铜色。\n\n不是尸体变铜。是活着的时候就已经变铜了。\n\n祖父从那之后再也没让Zack照过镜子超过三秒。\n\n\"看第一眼，确认位置。看第二眼，记住特征。第三眼——移开。超过三秒，它就开始读你了。\"\n\n三秒规则。Zack从小到大都遵守。\n\n但三晚以前，他违背了。\n\n他在一面古董店的橱窗里看到了一面铜镜。缠枝莲纹。\n\n他看了四秒。\n\n第四秒的时候，他梦到了木子韦。\n\n## 二\n\nZack的手稿里有一部分是祖父手写的，有一部分是他自己补充的。\n\n他从小就在读。不是学习，是生存指南。\n\n手稿的分类很清晰：\n\n第一部分：异化物的定义与分级。从\"镜\"到\"器\"到\"影\"到\"门\"。夺舍玄鉴属于\"门\"类——不是被动物件，而是通道。\n\n第二部分：夺舍玄鉴的详细记录。秦始皇铸造两面。一面流向民间，散落成缠枝莲纹仿品系列；另一面留在官方，被历朝历代的组织收容，传下来。\n\n第三部分：异化的四步过程。从镜中延迟→镜中独立→影子入体→同步完成。\n\n第四部分：应对方法。这是最薄的一部分。只有七页。祖父写道：\"无完美解法。唯有拖延。\"\n\nZack翻到第四部分的最后一页。\n\n那里夹着一张纸。是祖父临死前写的。字迹抖得几乎认不出来：\n\n*\"我错了。\"*\n\n*\"夺舍玄鉴不是门，是种子。种子种进一个人身上。那个人会长成新的门。\"*\n\n*\"陈默发现了这一点。所以他必须死。\"*\n\n*\"如果有人读到这里。请记住——\"*\n\n*\"不要叫名字。不要回应。不要确认。\"*\n\n*\"唯一的方法是——\"*\n\n下面的字被水渍糊住了。看不清。\n\n不是墨水被水泡了。是字本身被\"吃掉\"了。像是纸张上的墨迹被某种力量吸走了。\n\nZack盯着那页纸看了很久。\n\n然后他拿起座机，拨了名片上的号码。\n\n名片是老狼留给他的。三年前。\n\n*若镜中有非汝之影，撕此名片。*\n\n他没有撕。他只是拨了号码。\n\n铃声响了一下。\n\n\"Zack。\"\n\n\"我是老狼。铜镜。缠枝莲纹。\"\n\n对面沉默了两秒。\n\n\"几个？\"\n\n\"一个确认。陈明跑了，木子韦还在。双重心第十一日。\"\n\nZack从床边的椅子里拿出一个帆布包。拉开拉链。\n\n里面装着他从家里带来的东西：\n\n—一卷红线。两头各系一枚开元通宝铜钱。\n—一瓶铅粉。灰色的。装在透明玻璃瓶里。\n—一面小铜锣。手锣。边缘已经氧化发黑。\n—一本旧手稿。牛皮封面。边角起了毛。\n—一枚铜钱。比开元通宝大。中间没有方孔。正面刻\"封\"字。\n\n封界钱。祖父留下的最后一件东西。使用说明只有一句话：\n\n*\"此钱一次，封一界。用者，永入镜中。\"*\n\nZack拿起封界钱，拇指摩挲着那个\"封\"字。\n\n\"十一个没到同步——他听不见。没有听觉通传播速度被住了。但你们要快。我祖父的记录里，从第三步到第四步只用了三天。\"\n\n\"三天。\"\n\n\"我两个小时内到。\"Zack说，\"但在那之前提醒你——'观汝即见汝'。你们看到它的时候，它也在看你们。不只是镜子。任何反光面。今天去过的地方、用过的玻璃、金属表面——全部检查一遍。\"\n\n电话挂了。\n\nZack站起来。把帆布包甩到肩上。\n\n出门前，他看了一眼门口的玄关镜。\n\n一秒钟。\n\n镜中的自己。正常。\n\n两秒钟。\n\n镜中的自己眨了一下眼睛。\n\n他没有眨。\n\n三秒钟。\n\nZack移开了视线。\n\n\"开始了。\"他低声说。\n\n走廊的灯在他身后闪了一下。\n\n镜子里，Zack的背影还在原地。站了两秒才消失。\n\n像延迟了。\n"}, {"title": "第七章_三人", "content": "# 诡镜 · 第七章：三人\n\n车开进木子韦家小区的时候天已经暗了。\n\n街灯亮了，昏黄的光打在湿漉漉的地面上，反出一片片模糊的亮斑。\n\n老狼把车停在木子韦那栋楼下。三人下车。\n\nZack从包里拿出一根红线——两端各系一枚\"开元通宝\"铜钱。红线垂下来，在空气里轻轻晃。\n\n铜钱没有颤。暂时正常。\n\n但Zack注意到另一件事。\n\n三楼那扇窗户——木子韦家的窗户——窗帘拉着。但窗帘的缝隙里透出一线光。\n\n白色的光。不是灯光。\n\n冷白。\n\n跟陈明视频里一样的光。\n\n\"上。\"老狼说。\n\n楼道很暗。感应灯坏了。三人摸黑上了三楼。\n\n木子韦家的门是关着的。但没有锁——老狼推了一下就开了。\n\n屋里没开灯。只有窗外的路灯光从窗帘缝里切进来两道斜光。\n\n沙发上坐着一个人。\n\n木子韦。\n\n缩在沙发角落里，双手抱膝，脑袋埋在膝盖中间。戴着墨镜——即使屋里没有光源。\n\n听到门响他抬起了头。\n\n脸色灰白。眼圈发黑。嘴唇干裂。双手抱在胸前的姿势像一个自我保护的人。\n\n佳丽用口型说：\"跟我们走。\"\n\n木子韦看着她。点了点头。\n\nZack没说话。他站在门口，右手红线垂下来。\n\n红线是白色的。暂时是。\n\n但铜钱开始在掌心里微微颤动了。\n\nZack注意到了另一件事——木子韦的影子。\n\n路灯的光从窗户切进来，影子投在地板上。正常人的影子边缘是清晰的。但木子韦的——边缘模糊。而且影子的颜色比正常深。不是黑色。是比黑更暗的一种色调，像黑色里面有东西在流动。\n\n更关键的是，影子的轮廓比他实际的身体宽了一圈。肩膀的位置多出一块突起。像两个影子叠在一起。\n\nZack没说破。\n\n老狼走到木子韦面前蹲下。\"能走吗？\"\n\n木子韦点了点头。站起来的时候腿晃了一下。老狼扶住了他。很轻——几乎感觉不到重量。像一具空的壳子。\n\n四个人走出楼道。外面的天已经完全黑了。没有月亮。\n\n老狼先打开后车门，让木子韦坐进去。木子韦缩在后座的角落里，双手紧紧抱着膝盖，像一个在害怕的小孩。\n\nZack站在车门外面，红线垂着，盯着木子韦的方向。\n\n铜钱颤动的频率在加快。\n\n\"他在加重。\"Zack低声对老狼说，\"铜化速度比预期快。从他脖子开始——皮肤正在金属化。\"\n\n老狼看向木子韦的脖子。确实——在昏黄的路灯光下，木子韦脖颈处的肤色不自然地发暗。像一层薄薄的金属粉末铺在上面。\n\n\"先回去。\"老狼说。\n\n车开到市局大楼地下三层。\n\n办公室里。三张桌子。老狼坐在最里面那张，面前摊着一张城市地图。上面用红色图钉钉了十二个事件位置。\n\n木子韦坐在沙发上——办公室里那张破旧的双人沙发。双手抱膝，墨镜没摘。\n\n佳丽靠门站着，短棍握在手里。\n\nZack坐在木子韦对面，红线横放在两人之间。\n\n\"把手伸出来。\"Zack说。\n\n木子韦伸出双手，掌心向上。\n\nZack抓左手腕，搭脉搏。十秒。换右手。十秒。\n\n\"心跳是双重。\"Zack松开手，\"左右手节律不一样。左手重拍在前，右手轻拍在前。\"\n\n\"什么意思？\"佳丽问。\n\n\"异化第四步叫'同步'。不是两个心跳变成一个，是左右互换主导权。完成那一刻，左手和右手脉搏频率会完全逆转。\"Zack看向木子韦的脸。现在还在争夺。两个意识在同一个身体里抢控制权。木子韦的和那个东西的。\"\n\n他把手稿翻到一页，上面画着一个人形。胸口有一个亮点。旁边写着：\n\n*\"影中可见意识核心——一团光。光灭则人亡。\"*\n\n\"木子韦的意识还在。但被压在胸口。就像——\"Zack想了想，\"被绑在椅子上，眼睁着，看得见，听得到，但动不了。\"\n\n佳丽的手指按在短棍上。\"能救吗？\"\n\n\"手稿写了一种方法。但我祖父在旁边批了三个字：不确定。\"\n\n\"什么方法？\"\n\n\"让被异化者在镜子前直视镜中自己的眼睛，同时有人从外面叫他名字。叫到他的意识回应为止。\"\n\n\"如果意识不回应呢？\"\n\nZack看了木子韦一眼。\"那意识已经被挤出去了。站在你面前的就不再是他了。\"\n\n木子韦虽然没表情变化，但那抱在胸前的手微微地抖了一下。\n\n那种抖不是恐惧的颤抖。是一种努力控制的、用力把什么东西按回去的抖。\n\n他还想回来。\n\n老狼看着木子韦。看了三秒。\n\n\"明天开始。\"\n\n\"等不了明天了。\"Zack的声音沉了下来。\"木子韦的皮肤已经开始金属化。从他脖子看，铜化速度在加快。正常情况第三步到第四步大约七天。但他的——\"\n\nZack从包里拿出一枚更大的铜钱。中间没有方孔。正面刻着一个字——\"封\"。\n\n\"封界钱。我祖父留下的最后一件东西。使用说明只有一句话：'此钱一次，封一界。用者，永入镜。'\"\n\n沉默。\n\n\"意思是用这枚铜钱封住天枢——使用者会被永远留在镜子里。\"Zack把铜钱握在手心，\"但其他人都能活。木子韦也能恢复。\"\n\n木子韦的身体僵了一下。\n\n\"没有别的方法？\"老狼问。\n\n\"有。你把我打晕，绑起来，不让我用。然后找一个不需要牺牲的方案。\"Zack顿了一下，\"但我们没有时间找。\"\n\n佳丽的牙齿咬紧了。短棍握出了指印。\n\n\"多久？\"\n\nZack看了木子韦的脖子。铜色已经蔓延到了下颌边缘。\n\n\"四十八小时。铜化到达头部——完成。\"\n\n木子韦忽然抬起手，在左手手心写了几个字。老狼凑过去看：\n\n*不要牺牲任何人。*\n\nZack看着这几个字，沉默了三秒。\n\n\"这不是你能决定的了。\"\n\n木子韦又写了几个字：\n\n*一定有别的办法。*\n\nZack把铜钱放回包里。站起来。\n\n\"我今晚留在这里守着他。红线能预警。如果他心跳频率出现异常变化我会知道。\"\n\n\"你一个人？\"佳丽皱眉。\n\n\"不是一个人。\"Zack看向木子韦，\"他在。即使动不了，他还在。\"\n\n老狼起身。走到门口，停了一下，回头看了一眼客厅。\n\nZack盘腿坐在地。面朝木子韦方向。\n\n木子韦靠在沙发边上。抱膝。墨镜。胸口重轻起伏。\n\n佳丽坐在门边的凳子上。短横放在膝盖上。眼睛看着客厅每个方向。\n\n老狼出了门。\n\n楼道里灯自己亮了。\n\n没有原因。\n\n他低头看了一眼地面。\n\n从走廊另一头延伸过来，一道铜绿色水渍。从楼梯口一直到他家门口，停住了。\n\n像有什么东西从楼下走上来的。\n\n老狼的左手小臂上的铜绿色纹路——又往上了一截。到了肘部下面。\n\n不痛不痒。但能感觉到它在微微蠕动。\n\n像有什么东西在血管里游动。\n\n下楼。坐进车里。发动。\n\n从后视镜里了一眼木子韦家的窗户。\n\n灯亮着。窗帘前面站着一个影子。\n\n不是木子韦的。轮廓比木子韦宽。肩膀上多出一块突起。\n\n两个人的影子在一起。\n\n老狼看了三秒。把车开走了。\n"}, {"title": "第八章_守夜", "content": "# 诡镜 · 第八章：守夜\n\n零点过后，客厅里只剩三种声音。\n\n冰箱压缩机的嗡鸣。外面偶尔开过的车轮碾水声。还有Zack右手上红线维摩皮肤的声音。\n\n红线已经全黑了。从晚上十一点半始变成纯黑，黑到几乎吸收了手电筒余光落在上面的那一点亮度。\n\nZack盘腿坐在白线后面。面朝铜镜方向。眼睛闭着。\n\n他在听。\n\n不是用耳朵听——用手稿里写过：被标记过的人耳朵听不到镜子里的声音，但骨头能感觉。一种极低频的震动，从镜面传出来，顺着地板，经过膝盖，沿着脊椎往上升。\n\n他现在感觉到的震动频率是每分钟七十次。很慢。像一只沉睡中的东西的呼吸。\n\n左手掌心向上摊在膝盖上。掌心里放着那枚开元通宝铜。铜一直在微微颤动，不是风——窗户关着。是铜钱自身的金属在跟镜面的频率共振。\n\n手稿里写的第一个征兆：**铜钱自颤**——镜子里的东西还在那个空间里，没有过来。但只要铜还在颤，它就在。\n\nZack没动。眼睛依然闭着。他在等第二个征兆。\n\n---\n\n佳丽坐在门边的凳子上。短棍横在膝盖上，对讲机压在下面。她没有看手机，没有发呆，眼睛每隔五秒扫一遍客厅的四个方向。\n\n木子韦靠在沙发边上，戴着墨镜，双手抱在胸前。他闭着眼睛，但胸口在动——重、轻、重、轻。那双重心跳隔着衣服都能看到不规则的起伏。\n\n佳丽看了一眼手表。凌晨一点十七分。\n\n老狼说早上六点来。还有四个多小时。\n\n她重新抬头看客厅。然后她看到了。\n\n铜镜底部的床单——动了一下。很轻。不是风吹的。窗户关着。是从下面被顶起来。\n\n床单底下那条缝又出现了。跟老狼视频里看到的一样——冷白色的光从缝里出来。然后一只手从缝里伸了出来。\n\n不是\"伸\"。是\"渗\"。像液体一样往外漫。黑色的、光滑的、没有纹理的手指。那只手悬在半空，停了。五根手指开始动。在空画。在圆心点了一下。同心圆。圆心的眼睛形状。\n\n那只手停在半空。张开，然后慢慢收拢。像一把伞在合上。\n\n然后它缩回去了。缩回那条里。床单落回原位。光消失了。整个过程不到十秒。\n\nZack的眼睛依然闭着。但他左手掌心的铜钱，颤动的频率变了。\n\n从每分钟七十二次变成了一百零四次。快了百分之四十。\n\n## 二\n\n凌晨两点四十分。第二个征兆来了。\n\nZack感觉膝盖下面的地板变温了。不是发烫。是温度——从冰凉的木地板变成了一种接近人体温度的微温。温度从白线的铜钱端始蔓延，沿着粉笔线往中间走。\n\n他睁开眼。白线的中段，粉笔线本身没有变化。但线两侧各二十厘米的地板范围内，木纹的颜色变深了。不是潮湿。是一种从木板内部透出来的颜色变化。\n\n温度蔓延的范围在扩大。从二十到三十到四十厘米。它在朝Zack的方向移动。\n\nZack没有后退。他的左手从膝盖上移开，铜钱收进口袋。右手依然捏着红线。红线是黑的。\n\n温度漫到了白的边缘。粉笔线接触到了那片变温的区域——粉笔线始融化了。\n\n不是被水冲掉那种融化。是粉笔痕迹本身在高温下变软、流动，像蜡一样慢慢化开。\n\nZack把脚缩了回来。脚底的拖鞋底部已经变软了，橡胶被温度烤得发黏。\n\n他站了起来。不是因为害怕。是因为手稿里写过：**白线被破，界限失效**。\n\n他站到沙发的另一侧，跟木子韦之间隔了一个茶几的距离。\n\n木子睁开眼睛，透过墨镜看着他。Zack摇头，示意他不要说话，不要摘墨镜。\n\n然后Zack做了一件事——他看向了铜镜。\n\n不是从缝隙里看。他走到铜镜正前方，一米的距离。伸手，把床单掀开了。\n\n铜镜完整地暴露出来。镜面泛着暗沉的铜色。边框上的枝莲纹在微弱的光线下像活的一样——藤蔓纹样微微扭曲，像某种缓慢爬行的东西。\n\n镜面边缘刻着：观汝即见汝。\n\nZack看着镜面。镜面映出他。但镜面里映出客厅不是现实中的客厅。纵深被拉长了。十米变成了一百米。沙发、茶几、窗户都在来的位置，但之间的距离被拉大了一倍。\n\n在那个被拉长的镜中客厅的尽头，站着一个人影。背对着镜面。一动不动。\n\nZack眯起眼睛。他看到不是一个人影。是两个。\n\n一个是木子韦。站在大约十米的位置。跟之前一样。\n\n另一个在更远的地方。大约三十米。第二个影子的体型比木子韦小。更矮，更瘦。从背影看——是一个老人。\n\nZack的瞳孔缩了一下。那个背影的轮廓他很熟悉——不是因为见过这个人。是因为白天佳丽给他们看过的资料。陈明的租房合同上的联系人。刘美莲。七十三岁。老太太租客。\n\n镜中人还在三十米外站着。背对着镜面。一动不动。\n\n但Zack注意到一件事——那个老人的手里拎着一个木箱子。两个人才抬得动的那种。箱子是打开的。箱子里面还有一面铜镜。缠枝莲纹。\n\n两面镜子。一面在现实里挂在木子韦家的客厅墙上。一面在镜中世界里，被刘美莲拎在手里，站在三十米之外。\n\n两个空间。两面镜子。连通的。\n\nZack慢慢把床单重新蒙回去。动作很轻很慢，像在覆盖一具尸体。\n\n他对佳丽做了两个手势：\n\n第一，指铜镜，伸出手指。\n\n第二，指向地面，做了一个\"挖\"的动作。\n\n佳丽的瞳孔缩了一下。她懂了：两面镜子。地下有东西。\n\n## 三\n\n凌晨三点五十。温度退了。\n\n木板恢复冰凉。粉笔线虽然融化了一段，但大轮廓还在。铜钱恢复了常温，白雾消散。Zack重新盘腿坐下。但这次他没有闭眼。\n\n然后他看到了一件让呼吸停了半拍的事——镜面上出现了一道裂纹。\n\n不是物理裂纹。镜面本身完好无损。裂纹出现在镜面的\"影像\"上——就像你往水里扔了一颗石子，水面上的倒影始碎裂。\n\n一道竖直的裂纹，从镜面顶部延伸到底部。把镜中客厅的画面一分为二。裂缝里面不是黑暗。是一道极窄的、白色的光。\n\n比之前床缝隙里渗出来的冷白色光更白。白到刺眼。像镜子的另一面有一个人在举着强光手电往里照。\n\n光从裂缝里漏出来。漏在客厅的木地板上。光线照到的那一片地板，木纹开始变色。从木头的颜色变成了铜色。不是染色。是木头本身的质在变成金属。纹理还在，但材质变了——从木头变成了铜。\n\nZack站起来。走到那片铜质的地板前蹲下。手指碰了一下。冰凉。是金属的凉。真正的金属。\n\n他用指甲刮了一下铜面。刮出了一道浅痕。金属是真的。木头在变成铜。\n\nZack站起来，后退两步。脸色第一次出现变化——不是紧张，是某种接近恐惧的东西。手稿里没有写过这个。\n\n手稿里写过镜中空间被拉长。写过红线变黑。写过铜钱自颤。写过异化四步。没有写过现实的物质被镜像替换。\n\n木头变成。那下一步呢？\n\n空气变铜？地板变铜？墙壁变铜？还是——人变铜？\n\nZack看着那片铜质地板。转化速度在加快。从每秒钟一厘米变成了每秒钟两厘米。\n\n按照这个速度，天亮之前，整个客厅的地板都会变成铜。\n\n然后呢？\n\n他从包里掏出一个小型相机，对着铜质地板拍了三张。然后对着铜镜拍了三张。最后把相机递给佳丽。\n\n\"天亮把这些给老狼。告诉他：情况有变。不是夺舍玄鉴。\"\n\n\"不是什么？\"\n\n\"不止是夺舍玄鉴。这是比夺舍玄鉴更深的东西。手稿里叫它——镜化。\"\n\n\"镜化？\"\n\n\"异化的最终阶段。不是人变成影子。是现实本身被镜像替换。\"Zack声音压得很低，\"木头变铜只是开始。接下来是空气、光线、温度。然后是所有东西。包括人。\"\n\n\"包括木子韦？\"\n\nZack看向木子韦。\"他体内的两个心跳——一个是他的。另一个是镜子的。当两个心跳完全同步的时候，他不是变成影子。而是变成一面镜。\"\n\n佳丽的表情凝固了。\n\n\"变成一面镜子。\"她重复了一遍，\"你的意思是——他会变成一面镜子。活着的镜子。\"\n\nZack点头。\"然后所有照他的人，都会被吸进来。像陈明。像刘美莲。像所有在镜子里面站着的那些影子。\"\n\n\"我们只有不到四十八小时了。不是等到异化完成。是等到整间屋子被镜化。整间屋子变成一面镜子之后——所有进来的人，都出不去了。\"\n\n窗外的天还是黑的。但铜质地板的光，比窗外的天光亮。\n"}, {"title": "第九章_镜化", "content": "# 诡镜 · 第九章：镜化\n\n## 一\n\n老狼五点四十五到的。比约定的早了十五分钟。手提两个袋子：一个装设备，一个装早餐。\n\n站在门口看了一眼地面。铜绿水渍还在，比昨天淡了些，但没有消失。方向还是从楼下延伸过来，到门前停住。\n\n推门进去。客厅灯是开的。佳丽坐在门边凳子上，眼圈下有淡淡的青色——整夜没睡。短棍还横放膝盖上，但手松了。\n\nZack坐在地上，背靠沙发。不像昨晚盘腿坐的姿势了，现在是靠着的，眼睛半睁半闭。右手还捏着红线。红线还是黑的。\n\n木子韦靠在另一侧沙发上，墨镜已经摘了。脸色比昨天更差——灰白，像一层薄灰铺在脸上。嘴唇干裂。胸口还在动，重、轻、重、轻。但节奏比昨天慢了。很多。\n\n老狼先把早餐放在桌上。豆浆、油条、包子。没人动。\n\n\"情况。\"他说。佳丽把相机递过来。\n\n老狼翻照片：铜质地板、镜中客厅、两个影子——木子韦和刘美莲背影。\n\n\"三个阶段的异变活动。\"Zack声音沙哑——一整夜没怎么说话。\"第一阶段，一点十七分。一只手从镜子里伸出来，在空中画同心圆。没碰任何东西，自己收回了。第二阶段，两点四十。温度。地板从白线位置开始升温，粉笔线和铜钱被破坏了。界限失效。第三阶段，三点五十——镜面上出现裂纹。从裂纹里漏出光。光照到的木头变成了铜。真正的金属。\"\n\n老狼走到那片铜化区域前蹲下。用指关节敲了敲。声音不对。不是木头的声音。是沉闷金属的回响。像敲在一张薄铜板上。\n\n他转向木子韦：\"你感觉怎么样？\"\n\n木子韦看着他。表情很平。抬起右手，在左手手心里写：\n\n太。重。\n\n\"什么太重？\"木子韦指自己的胸口，然后指地面。想了想又写了三个字：\n\n在变硬。\n\n\"镜化在影响他。\"Zack说，\"木子韦是两面镜子之间的桥。现实里的铜镜，镜中世界的铜镜——他的身体是连接两面的通道。通道用得越多，通道本身就会被镜像同化。\"\n\n\"同化成什么？\"\n\n\"同化成镜子的一部分。\"\n\n老狼看着木子韦。\"有没有什么办法阻止？\"\n\n\"有。但不完美。\"Zack说，\"手稿里写了一种方法，但我祖父在旁边批了三个字：不确定。\"\n\n\"什么方法？\"\n\n\"让被异化者在镜子前直视镜中自己的眼睛。同时有人从外面叫他的名字。叫到他的意识回应为止。\"\n\n\"如果他不能？\"\n\nZack看了木子韦一眼。\"他的意识已经被挤出了。\"\n\n老狼沉默五秒。\"那我们现在能做的是什么？\"\n\n\"等。等到他的意识完全被挤出体外——镜子里的才是真他。然后我们叫他回来。\"Zack顿了一下，\"但现在还不是时机。因为我们还不知道他的意识到底在哪。\"\n\n\"什么意思？\"\n\n\"之前我说的方法——叫他名字看镜子里的他——那个方法不适用了。因为他的意识已经从镜中世界被挤到了身体内部。他的意识不在镜子里了，在他的身体里。被那个东西挤到了胸口的位置。\"\n\n\"那我们在跟谁说话？\"\n\n\"我们面前这个人——他还有自己的意识。但他的意识被那个东西压在胸口里，无法控制身体。就像一个被绑在椅子上的人，眼睁着，看得见，听得见，但——动不了。\"\n\n佳丽皱眉。\"所以我们要做的不是叫他回来。\"\n\n\"是把他拉出来。\"Zack说，\"从胸口那个位置重新拉回主导权。\"\n\n老狼：\"方法呢？\"\n\n\"只有一个方法。\"Zack从包里拿出一面普通方形玻璃镜。十厘米乘十厘米。带一个塑料框。\"我带来的。普通镜子。没有任何异常。\"\n\n他把小镜子递给木子韦。木子韦接住了。手在抖。\n\n\"看着镜子。看着里面你自己的眼睛。不要移开。\"\n\n## 二\n\n木子韦举起小镜子，看着镜面里的自己。一秒、两秒、三秒。\n\n胸口忽然剧烈起伏了一下。重轻节奏乱了。一连串急促的重、重、重。\n\n像两颗心脏在打架。\n\n木子韦的手开始抖得更厉害。小镜子里映出他的脸——灰白、消瘦、眼窝深陷。但瞳孔里有一种光——清醒的、挣扎的、想要抓住什么的光。\n\n\"他还在那里。\"Zack声音很低，\"被压在下。但他在试着出来。\"\n\nZack蹲到木子韦面前。平视他的眼睛。\"我数到三。我喊你的名字。你——不管你是谁，听到自己的名字用力点头。只点一次。\"\n\n木子韦的眼球转动了一下。瞳孔往Zack的方向偏了一度。\n\n\"准备好了吗？\"\n\n\"一。\"木子韦的手背青筋暴起。\n\n\"二。\"那个额外的跳猛烈地跳了一下。像什么东西在胸腔内撞了一拳。\n\n\"三。\"\"木子韦。\"\n\n沉默了两秒。然后——木子韦的头点了。\n\n只点了一下。很慢。很用力。像是用尽了全身的力气才出来的那一下。\n\nZack闭眼。呼了一口气。\"他的意识还在。\"\n\n但老狼注意到一件事——木子韦点了那个头之后，他的嘴角微微向上翘了一点。不是他自己的表情。是另一个东西的表情。\n\nZack看见了。睁开眼睛，盯着木子韦的嘴角。那个微笑停留了不到一秒就消失了。\n\n\"不对。\"Zack的声音变得很低。\"回应我们的不是木子韦。他的意识被压在胸口，动弹不得。他不可能点头。\"\n\n\"那是谁点的头？\"Zack看着他的胸口。那个亮点旁边——多了一个更暗的斑点。两个光点。一明一暗。\n\n\"刚才点头的不是木子韦的意识。是那个东西。借木子韦的身体点了头。为了让我们以为木子还在。\"\n\n镜子里一直看着这一切。表情出了一种木子韦能够认出的悲悯——像一个医生看着确诊的报告。\n\n## 三\n\n老狼：\"那我们现在能做什么？\"\n\n\"等。\"Zack说，\"等到他的意识足够强，强到能自己点头。或者——等到那个东西放松警惕，让木子韦有机会。\"\n\n\"多久？\"\n\n\"最多48小时。\"Zack顿了一下。\"铜化到达头——完成。然后整间屋子变成铜镜。所有人都在里面。\"\n\n木子韦忽然抬起手，在左手心里写了几个字。老狼凑过去看：\n\n*不要牺牲任何人。*\n\nZack看着这几个字，沉默了三秒。\"这不是你能决定的了。\"\n\n木子又写了几个字：*一定有别的办法。*\n\nZack：\"我今晚留在这里守着他。\"\n\n老狼：\"我带设备明天早来。\"他转身走到门口。停下，回头看了一眼客厅。\n\nZack盘腿坐在地上的白线后面。面朝着被蒙着的铜镜。一动不动。\n\n木子韦靠在沙发边上，戴着墨镜，双手抱在胸前。他的胸口在微微起伏——心跳的节奏，重、轻、重、轻。隔着衣服都能看出不规则起伏。\n\n佳丽坐在门边的凳子上。短棍横放在膝上。眼睛看着客厅的每一个方向。\n\n老狼出了门。楼道里的感应灯忽然亮了。不是因为他走过来的声音。楼道里什么都没有。\n\n灯自己亮的。\n\n他低头看地面——门口地上一道铜绿色的水渍，从走廊另一头延伸过来，在门前停住。像有什么东西从楼下走上来的。走到他门前。停了。然后走了。\n\n老狼手指摸向伞柄。脚步不停。走过水渍，没踩上去。下楼。坐进车里。发动。\n\n从后视镜里看了一眼三楼木子韦的窗户。灯亮着。窗帘前面站着一个影子。\n\n不是木子韦的。那个影子的轮廓比木子韦宽。肩膀上多出一块突起。像两个人的影子叠在一起。\n\n老狼看了三秒。把车开走了。\n"}, {"title": "第十章_唤名", "content": "# 诡镜 · 第十章：唤名\n\n## 一\n\n老狼第二天早上六点到的。\n\n比约定时间准。手里提了一个大工具箱——里面装了更多设备：高流明手电、铅粉瓶、备用铜钱、还有从局里实验室借来的一台便携式频谱仪。\n\n推门进去。\n\n客厅的灯是开的。但光不对——不是正常的暖白色灯光，而是一种带着极淡铜色的光。像灯泡表面镀了一层极薄的铜。\n\n佳丽还是坐在门边凳子上。眼睛下的青色更深了。但人是清醒的。短棍横在膝盖上。看到老狼进来她站了起来。\n\n\"一夜没出大事。但有三件小事。\"她说。\n\n\"说。\"\n\n\"第一点十七分，镜子里又伸出了一只手。画了同心圆。\"\n\n\"第二凌晨两点四十，地板开始升温。粉笔线被破坏。\"\n\n\"第三——\"她指向铜镜方向，\"裂纹扩大了。\"\n\n老狼走到铜镜前。\n\n床单还在。但床单底下鼓起来的面积比昨晚大了一倍。镜面裂纹从一道变成了三道。像蜘蛛网的第一根骨架。\n\n地板上铜色的区域——已经扩大到了三平米。从铜镜正前方一直蔓延到了客厅中央。\n\nZack靠坐在沙发上。不像昨晚那样盘腿正襟危坐了——他现在是靠着背的，眼睛半睁半闭。右手红线还着。红线全黑了。\n\n比烧焦的棉线还黑。\n\n\"你看到了。\"Zack说。没问句。\n\n\"看到了。\"老狼蹲下，从工具箱里拿出频谱仪。打开，把探头对准铜镜方向。\n\n屏幕开始跳动。频率读数从最低端慢慢往上爬。\n\n\"多少？\"佳丽凑过来看。\n\nZack没睁眼。\"七十二。昨晚是七十二。现在——\"\n\n频谱仪的数字停住了。一百四十四。\n\n翻倍了。\n\n\"它在加速。\"Zack终于睁开眼睛，\"频率翻倍意味着共振强度翻倍。两面镜子之间的连接在加强。\"\n\n老狼站起来，转向木子韦。\n\n木子韦靠在另一侧沙发上。脸色比昨天更糟——不是那种疲惫的苍白，而是一种金属质感的灰白。像皮肤下面有一层极薄的铜色在往外透。\n\n嘴唇干裂。眼角发黑。但眼睛是睁着的。透过墨镜能看出他在看着他们。\n\n\"你感觉怎么样？\"老狼问。\n\n木子韦抬起右手，在左手手心里写字。老狼凑近看。\n\n*太。重。*\n\n\"什么太重？\"\n\n木子韦指了指自己胸口，又指了指地面。想了想又写了三个字：\n\n*在变硬。*\n\n胸口的皮肤摸上去已经开始发硬了。不是肿胀那种硬——是像皮肤下面有一层金属正在成型。从内部往外硬。\n\nZack走过来蹲下，两根手指搭在木子韦左手腕上。十秒。换右手。十秒。\n\n\"左手重拍在前，右手轻拍在前。\"Zack松开手，\"跟昨晚一样。但两个节拍的差距在缩小。昨晚重拍和轻拍之间差了零点三秒。现在——差不超过零点一秒。\"\n\n\"什么意思？\"\n\n\"快同步了。\"Zack站起来，\"如果两个心跳的节拍差缩小到零——同步完成。意识交换。木子韦被挤进镜子里，那个东西接管他的身体。\"\n\n\"多久？\"\n\n\"按这个速度——最多十二个小时。\"\n\n佳丽的手指按紧短棍。\"那就现在开始。\"\n\n\"开始什么？\"\n\n\"手稿里写的方法。叫名字。\"佳丽看着Zack，\"你说过到第四步之前他还能被喊回来。现在就是之前。\"\n\nZack沉默了三秒。\n\n\"可以做。但有两个风险。\"\n\n\"说。\"\n\n\"第一，如果他意识已经被推到镜子里面了——那我们叫的是镜子里的他。镜子里的那个会回应。但回应的可能不是木子韦。\"\n\n\"第二呢？\"\n\n\"如果回应我们的是那个东西——它就获得了'被邀请'的合法权。可以从镜子里出来。\"\n\n老狼看着Zack。Zack看着老狼。两个人都明白这意味着什么。\n\n叫名字是一赌博。押注木子韦的意识还在身体里，还能被拉回来。\n\n不叫——等他自然同步。那他就完了。\n\n\"还有一个办法。\"Zack说。\n\n他从包里拿出那面十厘米的小玻璃镜——昨晚让木子韦看过的那面。\n\n\"先看影子。确认他的意识到底在哪里。\"\n\n## 二\n\n佳丽关了灯。拉严窗帘。客厅只剩老狼手里高流明手电的一点光。\n\n木子韦站在客厅中央吸顶灯正下方。Zack从侧面打手电。从左到右。\n\n影子投在右边墙壁上。\n\n三个人同时看到了。\n\n影子胸口那个亮点还在。但——\n\n亮点旁边多了一个暗色的斑点。两个光点。一明一暗。暗色斑点比昨晚大了。像一滴墨水滴在白色宣纸上在洇开。\n\n\"两个意识还在争夺。\"Zack说，\"亮点是木子韦。暗斑是那个东西。暗斑在扩大——说明那个东西正在抢占更多控制权。\"\n\n\"能看出来谁占上风吗？\"\n\n\"能。看心跳。\"Zack重新搭木子韦的脉搏，\"如果左手的重拍比右手更明显——木子韦还占着主导。但如果右手轻拍变得跟左手重拍一样强——\"\n\n他数了十秒。换右手。数了十秒。\n\n\"差不多了。\"Zack的声音沉了下来，\"右手轻拍的强度已经到了左手的百分之九十。再过几个小时就会超过。超过之后——主导权就是那个东西的了。\"\n\n\"还有多久？\"\n\n\"四个小时。\"\n\n办公室里安静了几秒。\n\n\"那就现在叫。\"老狼说。\n\nZack看了木子韦一眼。木子韦站在光里，表情很平。但嘴角在微微发抖。\n\n那种抖不是恐惧。是用力的。用力在控制什么东西。\n\n\"准备好了吗？\"Zack问。\n\n木子韦点了点头。很慢。很用力。\n\nZack蹲到他面前平视他的眼睛。\"我数到三。我喊你的名字。你——不管你是谁——听到自己的名字，用力点头。只点一次。\"\n\n木子韦的眼睛。瞳孔往Zack方向偏了半度。\n\n\"注意。如果他点了——说明他意识还在。我们有机会把他拉出来。如果没点——\"\n\n\"说明什么？\"佳丽问。\n\n\"说明意识已经不在了。站在这里的就只是——\"\n\nZack没说完。但所有人都知道那个词。\n\n影子。\n\n\"一。\"\n\n木的手背青筋暴起。\n\n\"二。\"\n\n额外心跳猛烈跳一下。像什么东西在胸腔内撞了一拳。\n\n\"三。木子韦。\"\n\n沉默两秒。\n\n然后木子韦的头点了。\n\n一下。很慢。很用力。像用尽全身力气挤出来的那一下。\n\nZack闭上眼睛呼出一口气。\"他的意识还在。\"\n\n但老狼注意到一件事。\n\n木子韦点头之后，他的嘴角微微向上翘一点。\n\n不是他自己的表情。\n\n是另一个东西的表情。\n\nZack也看到了。睁开眼睛盯着木的嘴角。\n\n那个微笑停留了不到一秒就消失了。\n\n\"不对。\"Zack声音沉了下去。\n\n\"什么不对？\"\n\n\"如果他的意识被压在胸口动弹不得——他不可能主动点头。\"Zack看着木子韦胸口，\"亮点旁边那个暗斑——它刚才闪了一下。\"\n\n\"闪了一下什么意思？\"\n\n\"是那个东西点的头。\"Zack站起来后退了一步，\"它借木子韦的身体点了头。为了让我们以为木子韦还在。\"\n\n\"为什么让我们以为这个——\"\n\n\"因为我们'确认'了他意识还在，我们就会开始'叫他回来'的行动。\"Zack的声音沉到了谷底，\"而每一次呼唤名字——都是在给那个东西开门。\"\n\n他转向铜镜方向。床单底下，镜面在微微震动。频率比昨晚快了三倍。\n\n\"它在用木子韦的身体骗我们帮它完成最后一步。\"\n\n木子韦还在那里。握着小镜子。胸口重轻重轻嘴角没有再翘。\n\n但老狼余光捕捉到一个东西——木脚下的影子里。亮点旁边暗色斑点在慢慢扩大。像一只眼睛在睁开。\n"}];

  var h='<div class="hdr"><span></span><h1>诡镜系列</h1><span class="act" onclick="toggleTheme()">🌙</span></div>';
  h+='<div class="cover"><div class="cbox"><span class="ctxt">诡镜</span><span class="cbdg">悬疑</span></div><div class="ninfo"><h1>诡镜系列</h1><div class="auth">匿名作者</div><div class="tags"><span>悬疑</span><span>都市怪谈</span><span>惊悚</span></div></div></div>';
  h+='<div class="stats"><div class="stat"><div class="sv">10</div><div class="sl">章节</div></div><div class="stat"><div class="sv">完本</div><div class="sl">状态</div></div><div class="stat"><div class="sv">A级</div><div class="sl">评级</div></div></div>';
  h+='<div class="intro"><h3>简介</h3><p>'+esc_s+'</p></div>';
  h+='<div class="cl-hdr"><h3>章节列表</h3></div><div id="clList">';
  chapters.forEach(function(ch,i){
    h+='<div class="cli" onclick="openCh('+i+')"><span class="n">'+String(i+1).padStart(2,'0')+'</span><span class="t">'+ch.title+'</span></div>';
  });
  h+='</div>';
  return h;
}

function renderReader(){
  var ch=chapters[curCh];
  if(!ch){view='novel';return renderNovel();}
  var prev=curCh>0?curCh-1:-1;
  var next=curCh<chapters.length-1?curCh+1:-1;
  var fs=parseInt(localStorage.getItem('gfs')||'17');
  var lang=localStorage.getItem('glang')||'zh-CN';
  var langLabel=lang==='zh-CN'?'简体':'繁体';
  var h='<div class="hdr"><span class="bk" onclick="back()">'+String.fromCharCode(8249)+'</span><h1>诡镜</h1><span class="act" onclick="toggleTheme()">'+(document.documentElement.getAttribute('data-theme')==='light'?String.fromCharCode(9728):String.fromCharCode(127769))+'</span></div>';
  h+='<div class="toolbar">';
  h+='<button class="tb-btn" onclick="changeFontSize(-1)">A-</button>';
  h+='<button class="tb-btn" onclick="changeFontSize(1)">A+</button>';
  h+='<span class="tb-label" id="fsLabel">'+fs+'px</span>';
  h+='<button class="tb-btn" onclick="toggleLang()" id="langBtn">'+langLabel+'</button>';
  h+='<button class="tb-btn" onclick="toggleTTS()" id="ttsBtn">'+String.fromCharCode(127897)+' 听书</button>';
  h+='</div>';
  h+='<div class="tts-bar" id="ttsBar">';
  h+='<button class="tts-btn" onclick="ttsPlay()" id="ttsPlayBtn">\u25B6 播放</button>';
  h+='<button class="tts-btn" onclick="ttsPause()" id="ttsPauseBtn">\u23F8 暂停</button>';
  h+='<button class="tts-btn" onclick="ttsStop()" id="ttsStopBtn">\u23F9 停止</button>';
  h+='<div class="rate-ctrl">';
  h+='<button class="tb-btn" onclick="ttsRate(-0.1)">-</button>';
  h+='<span class="tb-label" id="rateLabel">'+ttsRateVal.toFixed(1)+'x</span>';
  h+='<button class="tb-btn" onclick="ttsRate(0.1)">+</button>';
  h+='</div></div>';
  h+='<div class="audio-sec" id="audioSec"><span class="audio-label">Ch '+(curCh+1)+'</span><audio id="audioPlayer" controls preload="none"><source src="" type="audio/mpeg">您的浏览器不支持音频播放</audio></div>';
  h+='<div class="rpage" id="readerBody" style="font-size:'+fs+'px"></div>';
  h+='<div class="rnav">';
  h+='<button '+(prev>=0?'':'disabled')+' onclick="nav(-1)">'+String.fromCharCode(8592)+' 上一章</button>';
  h+='<button '+(next>=0?'':'disabled')+' onclick="nav(1)">下一章 '+String.fromCharCode(8594)+'</button>';
  h+='</div>';
  h+='<div class="comments-sec"><h3>评论</h3><div class="cmt-input"><input type="text" id="cmtInput" placeholder="写下你的想法..." maxlength="500"><button onclick="addComment()">发送</button></div><ul class="cmt-list" id="cmtList"></ul></div>';
  return h;
}

function convertText(text,toTrad){return toTrad?text.replace(/[\s\S]/g,function(ch){return s2t[ch]||ch;}):text.replace(/[\s\S]/g,function(ch){return t2s[ch]||ch;});}

function openCh(i){curCh=i;localStorage.setItem('gcc',String(i));view='reader';render();}

function nav(d){var n=curCh+d;if(n>=0&&n<chapters.length){curCh=n;localStorage.setItem('gcc',String(n));render();window.scrollTo(0,0);}}

function back(){view='novel';localStorage.removeItem('gcc');render();}

function toggleTheme(){
  var c=document.documentElement.getAttribute('data-theme')||'';
  var n=c?'':'light';
  document.documentElement.setAttribute('data-theme',n);
  localStorage.setItem('gt',n);
  var btn=document.getElementById('thmBtn');
  if(btn)btn.textContent=n?String.fromCharCode(9728):String.fromCharCode(127769);
}

function loadCh(i){
  var ch=chapters[i];var body=document.getElementById('readerBody');
  if(ch&&body){
    var lang=localStorage.getItem('glang')||'zh-CN';
    var content=ch.content;
    if(lang==='zh-TW'){content=convertText(content,true);}
    body.innerHTML=md(content);currentText=content;
  }
  loadComments();
  loadAudio();
}

function changeFontSize(d){
  var fs=parseInt(localStorage.getItem('gfs')||'17');
  fs=Math.max(14,Math.min(32,fs+d));
  localStorage.setItem('gfs',String(fs));
  var body=document.getElementById('readerBody');
  if(body)body.style.fontSize=fs+'px';
  var label=document.getElementById('fsLabel');
  if(label)label.textContent=fs+'px';
}

function toggleLang(){
  var lang=localStorage.getItem('glang')||'zh-CN';
  lang=lang==='zh-CN'?'zh-TW':'zh-CN';
  localStorage.setItem('glang',lang);
  var btn=document.getElementById('langBtn');
  if(btn)btn.textContent=lang==='zh-CN'?'简体':'繁体';
  loadCh(curCh);
}

function toggleTTS(){var bar=document.getElementById('ttsBar');if(bar)bar.classList.toggle('show');}

function initVoices(){if(!window.speechSynthesis)return;speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=function(){speechSynthesis.getVoices();};}

function getChineseVoice(){
  if(!window.speechSynthesis)return null;
  var voices=speechSynthesis.getVoices();
  var lang=localStorage.getItem('glang')||'zh-CN';
  var pref=lang==='zh-TW'?'zh-TW':'zh-CN';
  for(var i=0;i<voices.length;i++){if(voices[i].lang.indexOf(pref)===0)return voices[i];}
  for(var i=0;i<voices.length;i++){if(voices[i].lang.indexOf('zh')===0)return voices[i];}
  return voices.length>0?voices[0]:null;
}

function ttsPlay(){
  if(!window.speechSynthesis){alert('\u5f53\u524d\u6d4f\u89c8\u5668\u4e0d\u652f\u6301\u8bed\u97f3\u529f\u80fd\uff0c\u8bf7\u4f7f\u7528\u684c\u9762\u6d4f\u89c8\u5668');console.log('speechSynthesis not supported');return;}
  if(ttsState==='playing')return;
  var body=document.getElementById('readerBody');
  if(body)currentText=body.innerText||body.textContent;
  if(!currentText)return;
  try{
    speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(currentText);
    var v=getChineseVoice();if(v)u.voice=v;
    u.rate=ttsRateVal;u.lang=localStorage.getItem('glang')||'zh-CN';
    ttsState='playing';
    u.onend=function(){ttsState='stopped';updateTTSBtns();};
    u.onerror=function(e){console.log('TTS error:',e);ttsState='stopped';updateTTSBtns();alert('\u8bed\u97f3\u64ad\u653e\u5931\u8d25\uff1a\u5f53\u524d\u6d4f\u89c8\u5668\u4e0d\u652f\u6301\u8bed\u97f3\u529f\u80fd\uff0c\u8bf7\u4f7f\u7528\u684c\u9762\u6d4f\u89c8\u5668');};
    speechSynthesis.speak(u);updateTTSBtns();
  }catch(e){console.log('TTS exception:',e);alert('\u8bed\u97f3\u64ad\u653e\u5931\u8d25\uff1a\u5f53\u524d\u6d4f\u89c8\u5668\u4e0d\u652f\u6301\u8bed\u97f3\u529f\u80fd\uff0c\u8bf7\u4f7f\u7528\u684c\u9762\u6d4f\u89c8\u5668');}
}

function ttsPause(){
  if(!window.speechSynthesis)return;
  if(ttsState==='playing'){speechSynthesis.pause();ttsState='paused';}
  else if(ttsState==='paused'){speechSynthesis.resume();ttsState='playing';}
  updateTTSBtns();
}

function ttsStop(){if(!window.speechSynthesis)return;speechSynthesis.cancel();ttsState='stopped';updateTTSBtns();}

function ttsRate(d){
  ttsRateVal=Math.max(0.1,Math.min(2.0,+(ttsRateVal+d).toFixed(1)));
  localStorage.setItem('gtRate',String(ttsRateVal));
  var label=document.getElementById('rateLabel');
  if(label)label.textContent=ttsRateVal.toFixed(1)+'x';
  if(ttsState==='playing'){ttsStop();ttsPlay();}
}

function updateTTSBtns(){
  var pb=document.getElementById('ttsPlayBtn');
  var b2=document.getElementById('ttsPauseBtn');
  var b3=document.getElementById('ttsStopBtn');
  if(pb)pb.disabled=ttsState==='playing';
  if(b2)b2.disabled=ttsState!=='playing'&&ttsState!=='paused';
  if(b3)b3.disabled=ttsState==='stopped';
}

function loadComments(){
  var gc=JSON.parse(localStorage.getItem('gc')||'{}');
  var cm=gc[String(curCh)]||[];
  var list=document.getElementById('cmtList');
  if(!list)return;list.innerHTML='';
  cm.forEach(function(c,idx){
    var li=document.createElement('li');li.className='cmt-item';
    var t=new Date(c.x).toLocaleString();
    li.innerHTML='<div><div class="cmt-meta">'+esc(c.n)+' \u00B7 '+t+'</div><div class="cmt-text">'+esc(c.t)+'</div></div><button class="cmt-del" onclick="delComment('+idx+')">'+String.fromCharCode(215)+'</button>';
    list.appendChild(li);
  });
}

function addComment(){
  var inp=document.getElementById('cmtInput');if(!inp)return;
  var text=inp.value.trim();if(!text)return;
  var gc=JSON.parse(localStorage.getItem('gc')||'{}');
  if(!gc[String(curCh)])gc[String(curCh)]=[];
  gc[String(curCh)].push({n:String.fromCharCode(21295)+String.fromCharCode(21517),x:Date.now(),t:text});
  localStorage.setItem('gc',JSON.stringify(gc));inp.value='';loadComments();
}

function delComment(idx){
  var gc=JSON.parse(localStorage.getItem('gc')||'{}');
  var cm=gc[String(curCh)];
  if(cm){cm.splice(idx,1);gc[String(curCh)]=cm;localStorage.setItem('gc',JSON.stringify(gc));loadComments();}
}

function render(){
  document.getElementById('app').innerHTML=view==='novel'?renderNovel():renderReader();
  if(view==='reader'){loadCh(curCh);initVoices();updateTTSBtns();if(typeof loadAudio==="function")loadAudio();}
}

function loadAudio(){
  var audioSec=document.getElementById('audioSec');
  if(!audioSec)return;
  var src='audio/'+String(curCh+1).padStart(2,'0')+'_ch'+(curCh+1)+'.mp3';
  fetch(src,{method:'HEAD'}).then(function(r){
    if(r.ok){
      audioSec.style.display='block';
      var ap=document.getElementById('audioPlayer');
      if(ap)ap.querySelector('source').src=src;
    }else{
      audioSec.style.display='none';
    }
  }).catch(function(){audioSec.style.display='none';});
}

(function(){
  var t=localStorage.getItem('gt')||'';
  document.documentElement.setAttribute('data-theme',t);
  var btn=document.getElementById('thmBtn');
  if(btn&&t==='light')btn.textContent=String.fromCharCode(9728);
  initVoices();render();
})();

</script>
</body>
</html>
